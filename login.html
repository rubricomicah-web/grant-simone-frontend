<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mogul Grant System - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
--bg:#050805;
--card:#08170d;
--border:#163320;
--accent:#7EE787;
--text:#ffffff;
--muted:#c9d1c9;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

html,
body{
height:100%;
}

body{

min-height:100vh;

background:
radial-gradient(circle at top right,#1b4d2e 0%,transparent 35%),
radial-gradient(circle at bottom left,#0b1f12 0%,transparent 35%),
#050805;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

overflow:hidden;

color:#ffffff;

}

body::before{

content:"";

position:absolute;

width:700px;
height:700px;

background:
radial-gradient(
circle,
rgba(126,231,135,.12),
transparent 70%
);

top:-250px;
right:-150px;

pointer-events:none;

}

body::after{

content:"";

position:absolute;

width:600px;
height:600px;

background:
radial-gradient(
circle,
rgba(126,231,135,.06),
transparent 70%
);

bottom:-250px;
left:-150px;

pointer-events:none;

}

.login-card{

width:100%;
max-width:540px;

background:
rgba(8,23,13,.82);

backdrop-filter:blur(25px);

-webkit-backdrop-filter:blur(25px);

border:
1px solid rgba(126,231,135,.14);

border-radius:32px;

padding:50px;

position:relative;

z-index:2;

color:#ffffff;

box-shadow:
0 0 80px rgba(0,0,0,.45);

}

.logo{

display:flex;
justify-content:center;

margin-bottom:24px;

}

.logo-circle{

width:95px;
height:95px;

border-radius:50%;

background:
linear-gradient(
135deg,
#7EE787,
#2E7D32
);

display:flex;
justify-content:center;
align-items:center;

font-size:36px;
font-weight:900;

color:#ffffff;

box-shadow:
0 0 40px rgba(126,231,135,.25);

}

.brand{

text-align:center;

margin-bottom:35px;

color:#ffffff;

}

.brand h1{

font-size:38px;

font-weight:900;

margin-bottom:10px;

color:#ffffff !important;

letter-spacing:-1px;

}

.brand p{

font-size:15px;

line-height:1.8;

color:#d1d5db;

}

.error{

display:none;

margin-bottom:20px;

padding:15px;

border-radius:14px;

background:
rgba(255,0,0,.08);

border:
1px solid rgba(255,0,0,.15);

color:#ff9f9f;

font-size:14px;

}

.form-group{

margin-bottom:18px;

}

label{

display:block;

margin-bottom:8px;

font-size:14px;

font-weight:600;

color:#ffffff;

}

input{

width:100%;

padding:16px 18px;

background:
rgba(255,255,255,.03);

border:
1px solid rgba(255,255,255,.08);

border-radius:14px;

outline:none;

color:#ffffff;

font-size:15px;

transition:.25s;

}

input::placeholder{

color:#8f9a8f;

}

input:focus{

border-color:#7EE787;

box-shadow:
0 0 0 4px
rgba(126,231,135,.08);

}

.row{

display:flex;

justify-content:space-between;

align-items:center;

margin:18px 0 25px;

font-size:14px;

}

.checkbox{

display:flex;

align-items:center;

gap:8px;

color:#cbd5cb;

}

.checkbox input{

width:auto;

}

a{

text-decoration:none;

color:#7EE787;

}

.login-btn{

width:100%;

padding:18px;

border:none;

border-radius:16px;

background:
linear-gradient(
135deg,
#2E7D32,
#7EE787
);

color:#ffffff !important;

font-size:16px;

font-weight:800;

cursor:pointer;

transition:.25s;

box-shadow:
0 10px 30px
rgba(126,231,135,.25);

}

.login-btn:hover{

transform:translateY(-2px);

box-shadow:
0 15px 40px
rgba(126,231,135,.35);

}

.divider{

display:flex;

align-items:center;

margin:30px 0;

font-size:13px;

color:#777;

}

.divider::before,
.divider::after{

content:"";

flex:1;

height:1px;

background:
rgba(255,255,255,.08);

}

.divider span{

padding:0 15px;

}

.google-btn{

width:100%;

padding:16px;

border-radius:16px;

border:
1px solid rgba(255,255,255,.08);

background:
rgba(255,255,255,.03);

color:#ffffff;

font-weight:700;

cursor:pointer;

}

.footer{

margin-top:25px;

text-align:center;

font-size:14px;

color:#cbd5cb;

}

.footer a{

font-weight:700;

}

.loading{

opacity:.6;

pointer-events:none;

}

@media(max-width:600px){

.login-card{

padding:30px;

}

.brand h1{

font-size:30px;

}

}

</style>
</head>

<body>

<div class="login-card">

    <div class="logo">

        <div class="logo-circle">
            M
        </div>

    </div>

    <div class="brand">

        <h1>
            Mogul Grant System
        </h1>

        <p>
            Access your AI-powered funding platform,
            grant opportunities, proposal generator,
            and funding dashboard.
        </p>

    </div>

    <div
        id="errorBox"
        class="error"
    >
        Invalid login credentials.
    </div>

    <form
        onsubmit="login(event)"
    >

        <div class="form-group">

            <label>
                Email Address
            </label>

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required
            >

        </div>

        <div class="form-group">

            <label>
                Password
            </label>

            <input
                type="password"
                id="password"
                placeholder="Enter your password"
                required
            >

        </div>

        <div class="row">

            <label class="checkbox">

                <input type="checkbox">

                <span>
                    Remember me
                </span>

            </label>

            <a href="#">
                Forgot Password?
            </a>

        </div>

        <button
            id="loginBtn"
            class="login-btn"
            type="submit"
        >
            Login To Dashboard
        </button>

    </form>

    <div class="divider">
        <span>OR</span>
    </div>

    <button class="google-btn">
        Continue With Google
    </button>

    <div class="footer">

        Don't have an account?

        <a href="signup.html">
            Create Account
        </a>

    </div>

</div>

<script>

const API_BASE =
"https://mogul-grant-system-backend-production.up.railway.app";

async function login(e){

    e.preventDefault();

    const btn =
    document.getElementById(
        "loginBtn"
    );

    btn.classList.add(
        "loading"
    );

    btn.innerHTML =
    "Signing In...";

    const email =
    document.getElementById(
        "email"
    ).value.trim();

    const password =
    document.getElementById(
        "password"
    ).value;

    try{

        const response =
        await fetch(

            API_BASE +
            "/api/auth/login",

            {

                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({

                    email,
                    password

                })

            }

        );

        const data =
        await response.json();

        if(data.success){

            localStorage.setItem(
                "token",
                data.token
            );

            localStorage.setItem(
                "user",
                JSON.stringify(
                    data.user
                )
            );

            window.location.href =
            "dashboard.html";

            return;

        }

        showError(

            data.error ||

            "Invalid login credentials"

        );

    }catch(err){

        console.error(err);

        showError(
            "Unable to connect to server."
        );

    }

    btn.classList.remove(
        "loading"
    );

    btn.innerHTML =
    "Login To Dashboard";

}

function showError(message){

    const box =
    document.getElementById(
        "errorBox"
    );

    box.style.display =
    "block";

    box.innerHTML =
    message;

}

if(
    localStorage.getItem(
        "token"
    )
){

    console.log(
        "Existing session found"
    );

}

</script>

</body>
</html>
