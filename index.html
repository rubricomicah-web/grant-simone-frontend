<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Grant Simone</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#000;
color:white;
overflow:hidden;
height:100dvh;
-webkit-overflow-scrolling:touch;
}

.app{
display:flex;
min-height:100dvh;
}

.sidebar{
width:320px;
background:rgba(5,5,5,0.82);
padding:24px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.05);
}

.main{
height:100dvh;
display:flex;
flex-direction:column;
width:100%;
overflow:hidden;
}

.chat{
flex:1;
overflow-y:auto;
padding:16px 20px 180px 16px;
}

.message{
max-width:920px;
padding:24px;
border-radius:24px;
margin-bottom:20px;
line-height:1.8;
font-size:16px;
word-wrap:break-word;
}

.bot{
background:rgba(10,10,10,0.55);
border:1px solid rgba(255,255,255,0.05);
}

.user{
background:#FFD54F;
color:black;
margin-left:auto;
font-weight:bold;
}

.input-area{

position:fixed;

left:0;
right:0;

bottom:max(12px, env(safe-area-inset-bottom));

padding:0 16px;

padding-bottom:env(safe-area-inset-bottom);

width:100%;

background:transparent;

z-index:9999;

}

.input-wrap{
display:flex;
align-items:center;
gap:10px;
max-width:1000px;
margin:0 auto;
padding:14px 16px;
border-radius:32px;
background:rgba(10,10,10,0.82);
border:1px solid rgba(255,255,255,0.06);
}

.input-wrap textarea{
flex:1;
background:none;
border:none;
outline:none;
color:white;
font-size:16px;
padding:14px 10px;
resize:none;
overflow-y:auto;
min-height:52px;
height:52px;
max-height:140px;
}

.send-btn{
width:56px;
height:56px;
border:none;
border-radius:50%;
background:#FFD54F;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.saved-card{
background:#0d0d0d;
border:1px solid rgba(255,213,79,0.12);
border-radius:20px;
padding:18px;
margin-bottom:16px;
cursor:pointer;
}

.grants-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));
gap:24px;
margin-top:24px;
}

.grant-card{
background:rgba(10,10,10,0.55);
border:1px solid rgba(255,213,79,0.12);
border-radius:30px;
padding:28px;
}

.badge{
display:inline-block;
padding:10px 18px;
border-radius:999px;
background:rgba(255,213,79,0.08);
color:#FFD54F;
margin-bottom:22px;
}

.grant-title{
font-size:22px;
font-weight:bold;
margin-bottom:18px;
}

.grant-desc{
color:#bbb;
line-height:1.8;
margin-bottom:28px;
}

.actions{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.btn{
padding:14px 20px;
border:none;
border-radius:16px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.primary{
background:#FFD54F;
color:black;
}

.secondary{
background:#1b1b1b;
color:white;
}

@media(max-width:900px){

.sidebar{
display:none;
}

.input-wrap textarea{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<button
class="btn primary"
onclick="startNewConversation()"
style="width:100%;margin-bottom:20px;"
>
+ New Conversation
</button>

<div style="margin-bottom:16px;color:#666;font-size:12px;">
RECENT CONVERSATIONS
</div>

<div id="savedContainer"></div>

</div>

<div class="main">

<div
class="chat"
id="chat"
>

<div class="message bot">

Hi! I'm Grant Simone.

<br><br>

Tell me about your business,
nonprofit,
startup,
or funding goals
and I'll help you find
the best grants available.

</div>

</div>

<div class="input-area">

<div class="input-wrap">

<select id="stateSelect" style="
background:#111;
color:white;
border:none;
padding:12px;
border-radius:12px;
">

<option value="USA">All USA</option>
<option value="California">California</option>
<option value="Texas">Texas</option>
<option value="Florida">Florida</option>
<option value="New York">New York</option>

</select>

<textarea
id="userInput"
placeholder="Ask about grants..."
rows="1"
></textarea>

<button
class="send-btn"
onclick="sendMessage()"
>
↑
</button>

</div>

</div>

</div>

</div>

<script>

const chat =
document.getElementById("chat");

const userInput =
document.getElementById("userInput");

let conversations =
JSON.parse(
localStorage.getItem("conversations")
) || [];

let savedGrants =
JSON.parse(
localStorage.getItem("savedGrants")
) || [];

/* SAVE CONVERSATION */

function saveConversation(){

const messages = chat.innerHTML;

const cleanText =
chat.innerText.trim();

if(
cleanText === "" ||
cleanText.includes("Tell me about your business")
){
return;
}

const exists =
conversations.find(
c => c.messages === messages
);

if(exists){
return;
}

const conversationData = {

id: Date.now(),

title:
`Conversation ${conversations.length + 1}`,

messages,

timestamp: Date.now()

};

conversations.unshift(conversationData);

localStorage.setItem(
"conversations",
JSON.stringify(conversations)
);

renderSavedGrants();

}

/* NEW CONVERSATION */

function startNewConversation(){

const currentText =
chat.innerText.trim();

if(
currentText &&
!currentText.includes("Tell me about your business")
){
saveConversation();
}

chat.innerHTML = `

<div class="message bot">

Hi! I'm Grant Simone.

<br><br>

Tell me about your business,
nonprofit,
startup,
or funding goals
and I'll help you find
the best grants available.

</div>

`;

userInput.value = "";
userInput.style.height = "52px";

}

/* SEND MESSAGE */

async function sendMessage(){

const text =
userInput.value.trim();

const selectedState =
document.getElementById("stateSelect").value;

if(!text) return;

chat.innerHTML += `

<div class="message user">
${text}
</div>

`;

userInput.value = "";

const loadingId = Date.now();

chat.innerHTML += `

<div
class="message bot"
id="loading-${loadingId}"
>

Searching grants...

</div>

`;

chat.scrollTo({
top:chat.scrollHeight,
behavior:"smooth"
});

try{

const response = await fetch(
"https://grant-simone-backend-production.up.railway.app/grant-search",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

businessType:text,
keywords:text,
state:selectedState,
startup:"yes"

})

}
);

const data =
await response.json();

const loading =
document.getElementById(
`loading-${loadingId}`
);

if(loading){
loading.remove();
}

if(
data.grants &&
data.grants.length > 0
){

showGrantCards(data.grants);

}else{

chat.innerHTML += `

<div class="message bot">
No grants found.
</div>

`;

}

}catch(error){

console.error(error);

chat.innerHTML += `

<div class="message bot">
❌ Unable to fetch grants.
</div>

`;

}

}

/* SHOW GRANTS */

function showGrantCards(grants){

grants = grants.slice(0,10);

const cardsHTML =
grants.map(grant => {

const encodedGrant =
encodeURIComponent(
JSON.stringify(grant)
);

return `

<div class="grant-card">

<div class="badge">
AI Match ${Math.min(grant.matchScore,100)}%
</div>

<div class="grant-title">
${grant.grantName}
</div>

<div class="grant-desc">
${grant.description}
</div>

<div class="actions">

<button
class="btn primary"
onclick="
window.open(
'${grant.applicationUrl}',
'_blank'
)
"
>
Apply
</button>

<button
class="btn secondary"
onclick='saveGrantFromEncoded("${encodedGrant}")'
>
Save
</button>

</div>

</div>

`;

}).join("");

chat.innerHTML += `

<div class="message bot">

<div class="grants-grid">

${cardsHTML}

</div>

</div>

`;

chat.scrollTo({
top:chat.scrollHeight,
behavior:"smooth"
});

saveConversation();

}

/* SAVE GRANT */

function saveGrant(grant){

let saved =
JSON.parse(
localStorage.getItem("savedGrants")
) || [];

const exists = saved.find(
g => g.applicationUrl === grant.applicationUrl
);

if(exists){
return;
}

saved.unshift(grant);

localStorage.setItem(
"savedGrants",
JSON.stringify(saved)
);

savedGrants = saved;

renderSavedGrants();

}

/* SAVE GRANT FROM ENCODED */

function saveGrantFromEncoded(encoded){

const grant =
JSON.parse(
decodeURIComponent(encoded)
);

saveGrant(grant);

}

/* RENDER SIDEBAR */

function renderSavedGrants(){

const container =
document.getElementById("savedContainer");

let html = "";

/* CONVERSATIONS */

conversations.forEach((conv,index)=>{

html += `

<div
class="saved-card"
onclick="
openConversation(${index})
"
>

<h3>
💬 ${conv.title}
</h3>

<p>
Saved Conversation
</p>

</div>

`;

});

/* SAVED GRANTS */

savedGrants.forEach((grant)=>{

html += `

<div
class="saved-card"
onclick="
window.open(
'${grant.applicationUrl}',
'_blank'
)
"
>

<h3>
⭐ ${grant.grantName}
</h3>

<p>
Saved Grant
</p>

</div>

`;

});

container.innerHTML = html;

}

/* OPEN CONVERSATION */

function openConversation(index){

const conversation =
conversations[index];

if(!conversation) return;

chat.innerHTML =
conversation.messages;

chat.scrollTo({
top:0,
behavior:"smooth"
});

}

/* ENTER SEND */

userInput.addEventListener(
"keydown",
function(e){

if(
e.key === "Enter" &&
!e.shiftKey
){
e.preventDefault();
sendMessage();
}

}
);

/* AUTO RESIZE */

userInput.addEventListener(
"input",
function(){

this.style.height = "52px";

if(this.scrollHeight > 52){

this.style.height =
this.scrollHeight + "px";

}

}
);

/* MOBILE FIX */

window.addEventListener(
"resize",
()=>{

document.body.style.height =
window.innerHeight + "px";

}
);

/* INITIALIZE */

renderSavedGrants();

/* SAVE BEFORE EXIT */

window.addEventListener(
"beforeunload",
()=>{

const currentText =
chat.innerText.trim();

if(
currentText &&
!currentText.includes("Tell me about your business")
){
saveConversation();
}

}
);

</script>

</body>
</html>
