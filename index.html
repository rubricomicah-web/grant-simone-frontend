<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Grant Simone</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:
linear-gradient(
rgba(0,0,0,.82),
rgba(0,0,0,.92)
),
url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

background-size:cover;
background-position:center;
background-attachment:fixed;

min-height:100vh;

color:white;

display:flex;
justify-content:center;
align-items:center;

padding:20px;
overflow:hidden;
}

#app{

width:100%;
max-width:1200px;
height:92vh;

background:
rgba(10,10,10,.45);

backdrop-filter:blur(24px);

border:
1px solid rgba(212,175,55,.12);

border-radius:32px;

box-shadow:
0 20px 80px rgba(0,0,0,.55),
0 0 40px rgba(212,175,55,.08);

display:flex;
flex-direction:column;

overflow:hidden;
position:relative;
}

#header{

padding:24px 28px;

border-bottom:
1px solid rgba(255,255,255,.05);

display:flex;
justify-content:space-between;
align-items:center;
}

.logo{

display:flex;
align-items:center;
gap:14px;
}

.avatar{

width:52px;
height:52px;

border-radius:50%;

object-fit:cover;

border:
2px solid rgba(212,175,55,.45);

}

.logo h1{

font-size:20px;
font-weight:500;
}

.logo p{

font-size:13px;
color:rgba(255,255,255,.55);
}

.status{

padding:12px 16px;

border-radius:16px;

background:
rgba(255,255,255,.03);

border:
1px solid rgba(212,175,55,.12);

font-size:13px;

color:#d4af37;
}

/* CHAT */

#chat-container{

flex:1;
overflow-y:auto;
padding:30px;
scroll-behavior:smooth;
}

.message{

margin-bottom:24px;
display:flex;
}

.message.user{
justify-content:flex-end;
}

.message.ai{
justify-content:flex-start;
}

.bubble{

max-width:75%;

padding:18px 20px;

border-radius:22px;

line-height:1.8;

font-size:15px;

white-space:pre-wrap;
}

.user .bubble{

background:#d4af37;
color:black;

border-bottom-right-radius:6px;

font-weight:500;
}

.ai .bubble{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.06);

border-bottom-left-radius:6px;

color:rgba(255,255,255,.92);
}

/* INPUT */

#input-area{

padding:22px 24px;

border-top:
1px solid rgba(255,255,255,.05);
}

#input-wrapper{

display:flex;
align-items:flex-end;
gap:14px;

padding:14px 16px;

border-radius:24px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(212,175,55,.10);
}

textarea{

flex:1;

background:transparent;
border:none;
outline:none;
resize:none;

max-height:180px;
min-height:28px;

font-size:15px;
line-height:1.7;

color:white;

font-family:'Inter',sans-serif;
}

textarea::placeholder{
color:rgba(255,255,255,.35);
}

button{

width:54px;
height:54px;

border:none;

border-radius:50%;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:22px;
font-weight:700;

cursor:pointer;
}

/* TYPING */

.typing{

display:flex;
gap:6px;
padding:4px 0;
}

.typing span{

width:8px;
height:8px;

border-radius:50%;

background:#d4af37;

animation:bounce 1.4s infinite;
}

.typing span:nth-child(2){
animation-delay:.2s;
}

.typing span:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{

0%,80%,100%{
transform:scale(0);
opacity:.4;
}

40%{
transform:scale(1);
opacity:1;
}
}

@media(max-width:768px){

#app{
height:100vh;
border-radius:0;
}

.bubble{
max-width:92%;
font-size:14px;
}

}

</style>

</head>

<body>

<div id="app">

<div id="header">

<div class="logo">

<img
class="avatar"
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>
<h1>Grant Simone</h1>
<p>AI Grant Funding Consultant</p>
</div>

</div>

<div class="status">
● Online
</div>

</div>

<div id="chat-container"></div>

<div id="input-area">

<div id="input-wrapper">

<textarea
id="messageInput"
placeholder="Ask about grants, funding opportunities, or proposal generation..."
rows="1"
></textarea>

<button id="sendBtn">
↑
</button>

</div>

</div>

</div>

<script>

/* DIRECT ENDPOINTS */

const GRANT_SEARCH_API =
"https://grant-agent-backend-production.up.railway.app/grant-search";

const PROPOSAL_API =
"https://grant-agent-backend-production.up.railway.app/generate-proposal";

/* ELEMENTS */

const chatContainer =
document.getElementById("chat-container");

const input =
document.getElementById("messageInput");

const sendBtn =
document.getElementById("sendBtn");

/* AUTO RESIZE */

input.addEventListener("input",()=>{

input.style.height="auto";

input.style.height=
input.scrollHeight + "px";

});

/* ADD MESSAGE */

function addMessage(text,type){

const wrapper =
document.createElement("div");

wrapper.className =
`message ${type}`;

const bubble =
document.createElement("div");

bubble.className =
"bubble";

bubble.innerText = text;

wrapper.appendChild(bubble);

chatContainer.appendChild(wrapper);

chatContainer.scrollTop =
chatContainer.scrollHeight;

}

/* SHOW TYPING */

function showTyping(){

const wrapper =
document.createElement("div");

wrapper.className =
"message ai";

wrapper.id = "typing";

wrapper.innerHTML = `
<div class="bubble">
<div class="typing">
<span></span>
<span></span>
<span></span>
</div>
</div>
`;

chatContainer.appendChild(wrapper);

chatContainer.scrollTop =
chatContainer.scrollHeight;

}

/* REMOVE TYPING */

function removeTyping(){

const typing =
document.getElementById("typing");

if(typing){
typing.remove();
}

}

/* DETECT PROPOSAL */

function isProposal(text){

const lower =
text.toLowerCase();

return (
lower.includes("proposal") ||
lower.includes("grant proposal")
);

}

/* FETCH TIMEOUT */

async function fetchWithTimeout(
url,
options = {},
timeout = 120000
){

const controller =
new AbortController();

const timeoutId =
setTimeout(
()=> controller.abort(),
timeout
);

try{

const response =
await fetch(
url,
{
...options,
signal:controller.signal
}
);

clearTimeout(timeoutId);

return response;

}catch(error){

clearTimeout(timeoutId);

throw error;

}

}

/* SEND */

async function sendMessage(){

const message =
input.value.trim();

if(!message) return;

addMessage(message,"user");

input.value="";
input.style.height="auto";

showTyping();

try{

let endpoint =
GRANT_SEARCH_API;

let payload = {

businessType:
"All businesses, nonprofits, NGOs, startups, and organizations",

state:
"All United States",

keywords:
message

};

/* PROPOSAL */

if(isProposal(message)){

endpoint =
PROPOSAL_API;

payload = {

businessName:
"Business Organization",

businessType:
"Business or Nonprofit",

fundingPurpose:
"Growth and Funding",

grantName:
message

};

}

console.log(
"Sending:",
payload
);

const response =
await fetchWithTimeout(
endpoint,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(payload)
},
120000
);

console.log(
"Status:",
response.status
);

if(!response.ok){

throw new Error(
`Backend Error ${response.status}`
);

}

const data =
await response.json();

console.log(
"Response:",
data
);

removeTyping();

/* GRANTS */

if(endpoint === GRANT_SEARCH_API){

if(
Array.isArray(data.grants)
&&
data.grants.length > 0
){

let formatted = "";

data.grants.forEach(grant=>{

formatted +=
`Grant Name:
${grant.grantName || "Verified Grant"}

Funding Amount:
${grant.amount || "Varies"}

Purpose:
${grant.purpose || "Business Support"}

Eligibility:
${grant.eligibility || "Check Requirements"}

Application Link:
${grant.applicationUrl || "Unavailable"}

Recommendation:
${grant.recommendation || "Strong Match"}

----------------------------

`;

});

addMessage(formatted,"ai");

}

/* RESPONSE */

else if(data.response){

addMessage(
data.response,
"ai"
);

}

/* MESSAGE */

else if(data.message){

addMessage(
data.message,
"ai"
);

}

/* EMPTY */

else{

addMessage(
"No verified grants found currently.",
"ai"
);

}

}

/* PROPOSAL RESULT */

else{

addMessage(
data.proposalNarrative ||
data.response ||
"Proposal generated successfully.",
"ai"
);

}

}catch(error){

console.error(error);

removeTyping();

if(error.name === "AbortError"){

addMessage(
"The request took too long. Please try again.",
"ai"
);

return;

}

addMessage(
`Connection Error:
${error.message}`,
"ai"
);

}

}

/* BUTTON */

sendBtn.addEventListener(
"click",
sendMessage
);

/* ENTER */

input.addEventListener(
"keydown",
(e)=>{

if(
e.key==="Enter"
&&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

</script>

</body>

</html>
