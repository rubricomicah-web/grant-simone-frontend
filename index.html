<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Grant Simone</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:
linear-gradient(
rgba(0,0,0,.84),
rgba(0,0,0,.92)
),
url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

background-size:cover;
background-position:center;
background-attachment:fixed;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow:hidden;

color:white;
}

#app{

width:100%;
max-width:1300px;
height:94vh;

background:
rgba(12,12,12,.48);

backdrop-filter:blur(22px);

border:
1px solid rgba(255,255,255,.06);

border-radius:30px;

box-shadow:
0 25px 80px rgba(0,0,0,.55),
0 0 40px rgba(212,175,55,.08);

display:flex;
flex-direction:column;

overflow:hidden;
}

/* HEADER */

#header{

padding:22px 28px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:
1px solid rgba(255,255,255,.05);
}

.logo{

display:flex;
align-items:center;
gap:14px;
}

.avatar{

width:52px;
height:52px;

border-radius:50%;

object-fit:cover;

border:
2px solid rgba(212,175,55,.45);
}

.logo h1{

font-size:22px;
font-weight:600;
}

.logo p{

font-size:13px;
color:rgba(255,255,255,.55);
}

.status{

padding:12px 18px;

border-radius:18px;

background:
rgba(255,255,255,.03);

border:
1px solid rgba(212,175,55,.12);

font-size:13px;

color:#d4af37;
}

/* CHAT */

#chat-container{

flex:1;

overflow-y:auto;

padding:30px;

scroll-behavior:smooth;
}

.message{

margin-bottom:24px;
display:flex;
}

.message.user{
justify-content:flex-end;
}

.message.ai{
justify-content:flex-start;
}

.bubble{

max-width:80%;

padding:18px 20px;

border-radius:22px;

line-height:1.7;

font-size:15px;
}

.user .bubble{

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

border-bottom-right-radius:8px;

font-weight:600;
}

.ai .bubble{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.06);

border-bottom-left-radius:8px;

color:rgba(255,255,255,.92);
}

/* INPUT */

#input-area{

padding:22px 24px;

border-top:
1px solid rgba(255,255,255,.05);
}

#input-wrapper{

display:flex;
align-items:flex-end;
gap:14px;

padding:14px 16px;

border-radius:24px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(212,175,55,.08);
}

textarea{

flex:1;

background:transparent;
border:none;
outline:none;
resize:none;

max-height:180px;
min-height:28px;

font-size:15px;
line-height:1.7;

color:white;

font-family:'Inter',sans-serif;
}

textarea::placeholder{
color:rgba(255,255,255,.35);
}

button{

width:56px;
height:56px;

border:none;

border-radius:50%;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:22px;
font-weight:700;

cursor:pointer;

transition:.3s;
}

button:hover{

transform:scale(1.05);
}

/* TYPING */

.typing{

display:flex;
gap:6px;
padding:4px 0;
}

.typing span{

width:8px;
height:8px;

border-radius:50%;

background:#d4af37;

animation:bounce 1.4s infinite;
}

.typing span:nth-child(2){
animation-delay:.2s;
}

.typing span:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{

0%,80%,100%{
transform:scale(0);
opacity:.4;
}

40%{
transform:scale(1);
opacity:1;
}
}

/* GRANT CARDS */

.grant-card{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

border-radius:22px;

padding:22px;

margin-bottom:18px;

backdrop-filter:blur(12px);

transition:.3s;
}

.grant-card:hover{

transform:translateY(-2px);

border:
1px solid rgba(212,175,55,.30);

box-shadow:
0 10px 35px rgba(212,175,55,.08);
}

.grant-title{

font-size:18px;
font-weight:700;

margin-bottom:18px;

color:#f5d76e;
}

.grant-section{

margin-bottom:14px;
}

.grant-label{

font-size:12px;

text-transform:uppercase;

letter-spacing:.08em;

color:
rgba(255,255,255,.45);

margin-bottom:5px;
}

.grant-value{

font-size:15px;

line-height:1.7;

color:
rgba(255,255,255,.92);
}

.grant-link{

display:inline-block;

margin-top:14px;

padding:12px 18px;

border-radius:14px;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-weight:700;

text-decoration:none;

transition:.3s;
}

.grant-link:hover{

transform:scale(1.03);
}

.recommendation-badge{

display:inline-block;

margin-top:16px;

padding:8px 14px;

border-radius:999px;

font-size:12px;

font-weight:700;

color:white;

text-transform:uppercase;

letter-spacing:.05em;
}

/* PROPOSAL CARD */

.proposal-card{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(212,175,55,.18);

border-radius:24px;

padding:24px;

line-height:1.9;

backdrop-filter:blur(14px);

box-shadow:
0 10px 40px rgba(212,175,55,.06);
}

.proposal-header{

font-size:20px;
font-weight:700;

margin-bottom:18px;

color:#f5d76e;
}

.proposal-content{

font-size:15px;

color:
rgba(255,255,255,.92);

white-space:normal;
}

@media(max-width:768px){

#app{
height:100vh;
border-radius:0;
}

.bubble{
max-width:92%;
}

}

</style>

</head>

<body>

<div id="app">

<div id="header">

<div class="logo">

<img
class="avatar"
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>
<h1>Grant Simone</h1>
<p>AI Grant Funding Consultant</p>
</div>

</div>

<div class="status">
● Online
</div>

</div>

<div id="chat-container"></div>

<div id="input-area">

<div id="input-wrapper">

<textarea
id="messageInput"
placeholder="Ask about grants, funding opportunities, or proposal generation..."
rows="1"
></textarea>

<button id="sendBtn">
↑
</button>

</div>

</div>

</div>

<script>

/* API */

const GRANT_SEARCH_API =
"https://grant-agent-backend-production.up.railway.app/grant-search";

const PROPOSAL_API =
"https://grant-agent-backend-production.up.railway.app/generate-proposal";

/* ELEMENTS */

const chatContainer =
document.getElementById("chat-container");

const input =
document.getElementById("messageInput");

const sendBtn =
document.getElementById("sendBtn");

/* WELCOME */

window.onload = ()=>{

addMessage(
`Hello! I'm Grant Simone.

I can help you:

• Find grants
• Match funding opportunities
• Generate grant proposals
• Support nonprofits, NGOs, startups, and businesses

Try asking:
"Find grants for my nonprofit in Texas"
`,
"ai"
);

};

/* AUTO RESIZE */

input.addEventListener("input",()=>{

input.style.height="auto";

input.style.height=
input.scrollHeight + "px";

});

/* ADD MESSAGE */

function addMessage(content,type,isHTML=false){

const wrapper =
document.createElement("div");

wrapper.className =
`message ${type}`;

const bubble =
document.createElement("div");

bubble.className =
"bubble";

if(isHTML){

bubble.innerHTML = content;

}else{

bubble.innerText = content;

}

wrapper.appendChild(bubble);

chatContainer.appendChild(wrapper);

chatContainer.scrollTop =
chatContainer.scrollHeight;

}

/* TYPING */

function showTyping(){

const wrapper =
document.createElement("div");

wrapper.className =
"message ai";

wrapper.id = "typing";

wrapper.innerHTML = `
<div class="bubble">

<div style="margin-bottom:10px;font-weight:600;color:#f5d76e;">
Grant Simone
</div>

<div id="loadingText">
Searching verified funding databases...
</div>

<div class="typing" style="margin-top:12px;">
<span></span>
<span></span>
<span></span>
</div>

</div>
`;

chatContainer.appendChild(wrapper);

chatContainer.scrollTop =
chatContainer.scrollHeight;

const phases = [

"Searching verified funding databases...",
"Checking federal grant programs...",
"Scanning nonprofit funding opportunities...",
"Matching grants to your business...",
"Preparing recommendations..."

];

let i = 0;

const interval =
setInterval(()=>{

const el =
document.getElementById("loadingText");

if(!el){

clearInterval(interval);
return;
}

i = (i + 1) % phases.length;

el.innerText =
phases[i];

},2500);

}

function removeTyping(){

const typing =
document.getElementById("typing");

if(typing){
typing.remove();
}

}

/* DETECT PROPOSAL */

function isProposal(text){

const lower =
text.toLowerCase();

return (
lower.includes("proposal") ||
lower.includes("grant proposal")
);

}

/* FETCH WITH TIMEOUT */

async function fetchWithTimeout(
url,
options={},
timeout=120000
){

const controller =
new AbortController();

const timeoutId =
setTimeout(
()=> controller.abort(),
timeout
);

try{

const response =
await fetch(
url,
{
...options,
signal:controller.signal
}
);

clearTimeout(timeoutId);

return response;

}catch(error){

clearTimeout(timeoutId);

throw error;

}

}

/* RENDER GRANTS */

function renderGrantCards(grants){

let html = "";

grants.forEach(grant=>{

const recommendation =
(grant.recommendation || "Strong Match")
.toLowerCase();

let badgeColor = "#22c55e";

if(recommendation.includes("medium")){
badgeColor="#f59e0b";
}

if(recommendation.includes("low")){
badgeColor="#ef4444";
}

html += `

<div class="grant-card">

<div class="grant-title">
${grant.grantName || "Verified Grant Opportunity"}
</div>

<div class="grant-section">

<div class="grant-label">
Funding Amount
</div>

<div class="grant-value">
${grant.amount || "Varies"}
</div>

</div>

<div class="grant-section">

<div class="grant-label">
Purpose
</div>

<div class="grant-value">
${grant.purpose || "Business Support"}
</div>

</div>

<div class="grant-section">

<div class="grant-label">
Eligibility
</div>

<div class="grant-value">
${grant.eligibility || "Check requirements"}
</div>

</div>

<a
class="grant-link"
href="${grant.applicationUrl || "#"}"
target="_blank"
>

Apply for Grant →

</a>

<br>

<div
class="recommendation-badge"
style="background:${badgeColor}"
>

${grant.recommendation || "Strong Match"}

</div>

</div>

`;

});

return html;

}

/* SEND MESSAGE */

async function sendMessage(){

const message =
input.value.trim();

if(!message) return;

addMessage(message,"user");

input.value="";
input.style.height="auto";

showTyping();

try{

let endpoint =
GRANT_SEARCH_API;

let payload = {

businessType:
"All businesses, nonprofits, NGOs, startups, and organizations",

state:
"All United States",

keywords:
message

};

if(isProposal(message)){

endpoint =
PROPOSAL_API;

payload = {

businessName:
"Business Organization",

businessType:
"Business or Nonprofit",

fundingPurpose:
"Growth and Funding",

grantName:
message

};

}

const response =
await fetchWithTimeout(
endpoint,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(payload)
},
120000
);

if(!response.ok){

throw new Error(
`Backend Error ${response.status}`
);

}

const data =
await response.json();

removeTyping();

/* GRANTS */

if(endpoint === GRANT_SEARCH_API){

const userMessage =
message.toLowerCase();

const states = [
"california",
"texas",
"florida",
"new york",
"michigan",
"missouri",
"wisconsin"
];

let detectedState = "";

states.forEach(state=>{

if(userMessage.includes(state)){
detectedState = state;
}

});

let filteredGrants =
data.grants || [];

if(detectedState){

filteredGrants =
filteredGrants.filter(grant=>{

const text =
JSON.stringify(grant)
.toLowerCase();

return text.includes(detectedState);

});

}

if(filteredGrants.length === 0){

filteredGrants =
data.grants || [];

}

if(filteredGrants.length > 0){

const cards =
renderGrantCards(filteredGrants);

addMessage(cards,"ai",true);

}else{

addMessage(
"No verified grants found currently.",
"ai"
);

}

}

/* PROPOSAL */

else{

console.log("Proposal Response:", data);

let proposalText = "";

proposalText =
data.proposalNarrative ||
data.proposal ||
data.content ||
data.response ||
data.message ||
"";

if(typeof data === "string"){
proposalText = data;
}

if(!proposalText){

proposalText =
JSON.stringify(data,null,2);

}

const formattedProposal = `

<div class="proposal-card">

<div class="proposal-header">
Grant Proposal
</div>

<div class="proposal-content">
${proposalText.replace(/\n/g,"<br>")}
</div>

</div>

`;

addMessage(
formattedProposal,
"ai",
true
);

}

}catch(error){

console.error(error);

removeTyping();

if(error.name === "AbortError"){

addMessage(
"The request took too long. Please try again.",
"ai"
);

return;

}

addMessage(
`Connection Error:
${error.message}`,
"ai"
);

}

}

/* BUTTON */

sendBtn.addEventListener(
"click",
sendMessage
);

/* ENTER */

input.addEventListener(
"keydown",
(e)=>{

if(
e.key==="Enter"
&&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

</script>

</body>

</html>
