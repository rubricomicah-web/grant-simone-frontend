<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Grant Simone</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html{
scroll-behavior:smooth;

}
  
body{

background:#000;
color:white;
overflow-x:hidden;

text-rendering:optimizeLegibility;
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;

background-image:

linear-gradient(
rgba(0,0,0,0.82),
rgba(0,0,0,0.88)
),

url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

}

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{

width:320px;

background:

rgba(5,5,5,0.82);

backdrop-filter:blur(14px);

-webkit-backdrop-filter:blur(14px);

border-right:

1px solid rgba(255,255,255,0.05);

padding:24px;

overflow-y:auto;

}

.logo{

display:flex;
align-items:center;
gap:14px;

margin-bottom:28px;
transition:

transform 0.3s ease,

box-shadow 0.3s ease;
}

.logo img{

width:62px;
height:62px;

border-radius:50%;
object-fit:cover;
}

.logo img:hover{

transform:scale(1.05);

box-shadow:

0 0 25px rgba(255,213,79,0.18);

}

.logo h1{

font-size:18px;
line-height:1.1;
font-weight:800;
}

.logo p{

color:#999;
margin-top:6px;
}

.new-chat{

width:100%;

padding:14px 18px;

border:none;

border-radius:16px;

background:#FFD54F;

font-size:16px;
font-weight:700;

cursor:pointer;

margin-bottom:24px;

transition:

transform 0.25s ease,

border-color 0.25s ease,

box-shadow 0.25s ease;
}

.new-chat:hover{

transform:translateY(-2px);

opacity:0.95;
}

.sidebar-title{

font-size:12px;

letter-spacing:2px;

color:#666;

margin-bottom:16px;
}

.saved-card{

background:#0d0d0d;

border:
1px solid rgba(255,213,79,0.12);

border-radius:20px;

padding:18px;

margin-bottom:16px;

cursor:pointer;

transition:

transform 0.25s ease,

border-color 0.25s ease,

box-shadow 0.25s ease;
}

.saved-card:hover{

border-color:#FFD54F;

transform:translateY(-3px);

box-shadow:
0 10px 25px rgba(255,213,79,0.06);
}

.saved-card h3{

font-size:18px;

margin-bottom:8px;
}

.saved-card p{

color:#777;

font-size:14px;
}

/* MAIN */

.main{

height:100dvh;

display:flex;

flex-direction:column;

width:100%;

overflow:hidden;
}

.topbar{

padding:16px 24px;

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:

1px solid rgba(255,255,255,0.05);

background:

rgba(5,5,5,0.45);

backdrop-filter:blur(12px);

-webkit-backdrop-filter:blur(12px);

}

.top-left{

display:flex;
align-items:center;
gap:14px;
}

.top-left img{

width:48px;
height:48px;

border-radius:50%;
object-fit:cover;
}

.top-left h1{

font-size:18px;

line-height:1.1;

font-weight:700;
}

.top-left p{

color:#999;

margin-top:4px;

font-size:13px;
}

.online{

padding:8px 16px;

border-radius:999px;

border:
1px solid rgba(255,213,79,0.2);

background:
rgba(255,213,79,0.08);

color:#FFD54F;

font-size:14px;

font-weight:600;

animation:onlinePulse 2s infinite;
}

/* CHAT */

.chat{

flex:1;

overflow-y:auto;

scrollbar-gutter:stable;

scroll-behavior:smooth;

padding:16px 20px 180px 16px;

min-height:0;
}

.message{

max-width:920px;

padding:28px;

border-radius:30px;

margin-bottom:24px;

line-height:1.9;

font-size:18px;

word-wrap:break-word;

overflow-wrap:break-word;
}

.bot{

background:
rgba(10,10,10,0.55);

backdrop-filter:blur(12px);

border:
1px solid rgba(255,255,255,0.05);

box-shadow:
0 4px 20px rgba(0,0,0,0.18);

position:relative;

z-index:1;

overflow:hidden;

animation:fadeIn 0.35s ease;

will-change:transform,opacity;

}
.bot::before{

content:'';

position:absolute;

top:0;

left:0;

right:0;

height:1px;

background:

linear-gradient(

90deg,

transparent,

rgba(255,255,255,0.18),

transparent

);

pointer-events:none;

}

.loading-ai{

animation:pulseGlow 2s infinite;
cursor:progress;

}
  
.user{

background:#FFD54F;

color:black;

margin-left:auto;

font-weight:bold;
}

/* GRANTS */

.grants-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:24px;

margin-top:24px;

align-items:stretch;
}
  
.grant-card{

background:
rgba(10,10,10,0.55);

backdrop-filter:blur(14px);

border:
1px solid rgba(255,213,79,0.12);

border-radius:30px;

padding:28px;

transition:

transform 0.25s ease,
border-color 0.25s ease,
box-shadow 0.25s ease;

position:relative;

z-index:2;
}
.grant-card::before{

content:'';

position:absolute;

top:0;

left:0;

right:0;

height:1px;

background:

linear-gradient(

90deg,

transparent,

rgba(255,255,255,0.14),

transparent

);

pointer-events:none;

}

.grant-card:hover{

transform:translateY(-4px);

border-color:#FFD54F;

box-shadow:
0 10px 35px rgba(255,213,79,0.08);
}

.badge{

display:inline-block;

padding:10px 18px;

border-radius:999px;

background:
rgba(255,213,79,0.08);

border:
1px solid rgba(255,213,79,0.14);

color:#FFD54F;

margin-bottom:22px;
}

.grant-title{

font-size:22px;

font-weight:bold;

margin-bottom:18px;
}

.grant-desc{

color:#bbb;

line-height:1.8;

margin-bottom:28px;
}

.actions{

display:flex;

gap:12px;

flex-wrap:wrap;

position:relative;

z-index:5;
}

.btn{

padding:14px 20px;

border:none;

border-radius:16px;

cursor:pointer;

font-size:16px;
font-weight:bold;
letter-spacing:0.3px;
  
transition:
transform 0.2s ease,
opacity 0.2s ease,
box-shadow 0.25s ease;

will-change:
transform,
box-shadow;
  
}

.btn:hover{
transform:translateY(-2px);
}

.btn:active{
transform:scale(0.97);
}
  
.primary{

background:#FFD54F;

color:black;

box-shadow:

0 0 18px rgba(255,213,79,0.18);

}

.primary:hover{

box-shadow:

0 0 30px rgba(255,213,79,0.35);

}
.secondary{

background:#1b1b1b;

color:white;
}

/* INPUT */

.input-area{

position:fixed;

bottom:12px;

left:0;
right:0;

width:100%;

padding:0 16px;

background:transparent;

z-index:9999;
}

.input-wrap{

display:flex;

align-items:center;

gap:10px;

max-width:1000px;

margin:0 auto;

padding:14px 16px;

border-radius:32px;

background:

rgba(10,10,10,0.82);

backdrop-filter:blur(16px);

border:

1px solid rgba(255,255,255,0.06);

box-shadow:

0 0 25px rgba(0,0,0,0.4);

min-height:72px;

transition:

border-color 0.25s ease,

box-shadow 0.25s ease,

transform 0.25s ease;

}

.input-wrap:focus-within{

border-color:

rgba(255,213,79,0.25);

box-shadow:

0 0 40px rgba(255,213,79,0.12);

transform:translateY(-1px);

}
  
.input-wrap textarea{

flex:1;

background:none;

border:none;

outline:none;

color:white;

font-size:16px;

padding:14px 10px;

resize:none;

overflow-y:auto;

min-height:52px;

height:52px;

max-height:140px;

line-height:1.6;

font-family:inherit;

scrollbar-width:none;

}

.input-wrap textarea::-webkit-scrollbar{

display:none;

}
.send-btn{

min-width:56px;

width:56px;

height:56px;

aspect-ratio:1/1;

flex-shrink:0;

display:flex;

align-items:center;

justify-content:center;

border:none;

border-radius:50%;

background:#FFD54F;

font-size:24px;

font-weight:bold;

cursor:pointer;

transition:0.25s;

box-shadow:0 0 20px rgba(255,213,79,0.25);
}

.send-btn:hover{

transform:scale(1.06);

box-shadow:
0 0 35px rgba(255,213,79,0.45);

}

.chat::-webkit-scrollbar{

width:8px;

}

.chat::-webkit-scrollbar-track{

background:transparent;

}

.chat::-webkit-scrollbar-thumb{

background:rgba(255,213,79,0.18);

border-radius:999px;

}

.chat::-webkit-scrollbar-thumb:hover{

background:rgba(255,213,79,0.35);

}

.send-btn:active{

transform:scale(0.96);

}

/* MODAL */

.custom-modal-overlay{

position:fixed;

inset:0;

background:
rgba(0,0,0,0.84);

display:flex;

justify-content:center;

align-items:center;

padding:20px;

z-index:999999;
  
backdrop-filter:blur(4px);
}

.custom-modal{

width:100%;

max-width:650px;

background:
rgba(15,15,15,0.7);

backdrop-filter:blur(18px);

border-radius:30px;

border:
1px solid rgba(255,213,79,0.14);

padding:40px;

position:relative;
}

.close-modal{

position:absolute;

top:20px;
right:20px;

width:42px;
height:42px;

border:none;

border-radius:50%;

background:#222;

color:white;

cursor:pointer;
}

.modal-title{

font-size:42px;

margin-bottom:18px;
}

.modal-desc{

color:#bbb;

line-height:1.9;

margin-bottom:28px;
}

.modal-actions{

display:flex;

gap:14px;

flex-wrap:wrap;
}



/* MOBILE */

@media(max-width:900px){
.app{
flex-direction:column;
}

.sidebar{
display:none;
}

.topbar{

padding:
max(22px, env(safe-area-inset-top))
18px
14px;
}

.top-left{
gap:10px;
}

.top-left img{
width:52px;
height:52px;
}

.top-left h1{
font-size:22px;
line-height:1;
}

.top-left p{
font-size:12px;
}

.message{

font-size:15px;

padding:16px;

border-radius:22px;

line-height:1.7;

word-wrap:break-word;

overflow-wrap:break-word;
}

.bot{

max-width:92%;

margin-right:auto;
}

.user{

max-width:88%;

margin-left:auto;
}

.grants-grid{

grid-template-columns:1fr;

gap:18px;
}

.grant-card{

padding:20px;

border-radius:24px;
}

.grant-title{
font-size:22px;
}

.grant-desc{
font-size:14px;
}

.actions{
gap:10px;
}

.btn{

padding:12px 16px;

font-size:14px;

}

.input-area{

padding:10px 16px 12px;
}

.input-wrap{

padding:8px;
}

.input-wrap textarea{

font-size:14px;

padding:10px 12px;
}

.custom-modal{
padding:26px;
}

.modal-title{
font-size:28px;
}

.modal-desc{
font-size:15px;
}

}

@media(min-width:901px){

.input-area{

left:50%;

transform:translateX(-50%);

bottom:20px;

width:calc(100% - 420px);

max-width:980px;
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(12px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes pulseGlow{
0%{
box-shadow:0 0 0 rgba(255,213,79,0);
}
50%{
box-shadow:0 0 30px rgba(255,213,79,0.12);
}
100%{
box-shadow:0 0 0 rgba(255,213,79,0);
}
}
  
.dots::after{
  
content:'';
animation:dots 1.5s infinite;
  
}
  
@keyframes dots{
  
0%{content:'';}
25%{content:'.';}
50%{content:'..';}
75%{content:'...';}
100%{content:'';}
  
}

@keyframes onlinePulse{

0%{

box-shadow:0 0 0 rgba(255,213,79,0);

}

50%{

box-shadow:0 0 18px rgba(255,213,79,0.18);

}

100%{

box-shadow:0 0 0 rgba(255,213,79,0);

}

}

body{

animation:appFade 0.6s ease;

}

@keyframes appFade{

from{

opacity:0;

transform:scale(1.01);

}

to{

opacity:1;

transform:scale(1);

}

}
  
</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<div class="logo">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>

<h1>Grant Simone</h1>

<p>
AI Grant Funding Consultant
</p>

</div>

</div>

<button
class="new-chat"
onclick="startNewConversation()"
>
+ New Conversation
</button>

<div class="sidebar-title">
RECENT CONVERSATIONS
</div>

<div id="savedContainer"></div>

</div>

<div class="main">

<div class="topbar">

<div class="top-left">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>

<h1>Grant Simone</h1>

<p>
AI Grant Funding Consultant
</p>

</div>

</div>

<div class="online">
● Online
</div>

</div>

<div
class="chat"
id="chat"
>

<div class="message bot">

Hi! I'm Grant Simone.

<br><br>

Tell me about your business,
nonprofit,
startup,
or funding goals
and I'll help you find
the best grants available.

</div>

</div>

<div class="input-area">

<div class="input-wrap">

<textarea
id="userInput"
placeholder="Ask about grants, funding, nonprofits..."
rows="1"
></textarea>

<button
class="send-btn"
onclick="sendMessage()"
>
↑
</button>

</div>

</div>

</div>

</div>

<script>

const chat =
document.getElementById("chat");

const userInput =
document.getElementById("userInput");

/* SAVED GRANTS */

let savedGrants =
JSON.parse(
localStorage.getItem("savedGrants")
) || [];

/* SAVED CONVERSATIONS */

let conversations =
JSON.parse(
localStorage.getItem("conversations")
) || [];

/* START NEW CONVERSATION */

function startNewConversation(){

if(
chat.innerHTML.trim() !== ""
){

saveConversation();

}

chat.innerHTML = `

<div class="message bot">

Hi! I'm Grant Simone.

<br><br>

Tell me about your business,
nonprofit,
startup,
or funding goals
and I'll help you find
the best grants available.

</div>

`;

userInput.value = "";

userInput.style.height = "52px";

}

/* ENTER TO SEND */

userInput.addEventListener(
"keydown",
function(e){

if(
e.key === "Enter" &&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

/* AUTO EXPAND TEXTAREA */

userInput.addEventListener(
"input",
function(){

this.style.height = "52px";

if(this.scrollHeight > 52){

this.style.height =
this.scrollHeight + "px";

}

}
);

/* SEND */

async function sendMessage(){

const input =
document.getElementById("userInput");

const text =
input.value.trim();

if(!text) return;

chat.innerHTML += `

<div class="message user">
${text}
</div>

`;

const loadingId = Date.now();
chat.innerHTML += `
<div class="message bot loading-ai" id="loading-${loadingId}">
<div style="font-size:20px;font-weight:bold;margin-bottom:12px;">
🤖 Grant Simone AI
</div>
<div style="color:#FFD54F;">
Searching live grant databases
<span class="dots"></span>
</div>
<br>
Reviewing:
<br>
• Federal grants
<br>
• Startup funding
<br>
• Small business opportunities
<br>
• Private foundation grants
</div>
`;
  
input.value = "";
input.style.height = "52px";

chat.scrollTo({
top: chat.scrollHeight,
behavior:"smooth"
});
  
try{

const response = await fetch(
"https://grant-simone-backend-production.up.railway.app/grant-search",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

businessType:text,

state:"USA",

keywords:text,

womanOwned:"yes",

minorityOwned:"no",

veteranOwned:"no",

startup:"yes",

nonprofit:"no"

})
  
}
);

const data =
await response.json();
  
const loadingMessage =
document.getElementById(`loading-${loadingId}`);
if(loadingMessage){
loadingMessage.remove();
}

if(data.success){

showGrantCards(data.grants);

}else{

chat.innerHTML += `

<div class="message bot">

No grants found.

</div>

`;

}

chat.scrollTo({
top: chat.scrollHeight,
behavior:"smooth"
});

}catch(error){
console.error(error);
const loadingMessage =
document.getElementById(`loading-${loadingId}`);
if(loadingMessage){
loadingMessage.remove();
}
chat.innerHTML += `
<div class="message bot">
❌ Unable to fetch grants right now.
Please try again in a few moments.
</div>
`;
}
}
/* SHOW CARDS */

function showGrantCards(grants){

const cardsHTML =
grants.map(grant => `

<div class="grant-card">

<div class="badge">
AI Match ${Math.min(grant.matchScore + 35, 98)}%
</div>

<div class="grant-title">
${grant.grantName}
</div>

<div class="grant-desc">
${grant.description}
</div>

<div class="actions">

<button
class="btn primary"
onclick="
openGrantModal(
'${grant.grantName}',
'Match ${grant.matchScore}%',
'${grant.description}',
'${grant.applicationUrl}'
)
"
>
View Details
</button>

<button
class="btn secondary"
onclick="
saveGrant(
'${grant.grantName}'
)
"
>
Save
</button>

<button
class="btn secondary"
onclick="
downloadPDF(
'${grant.grantName}'
)
"
>
Generate Proposal
</button>

</div>

</div>

`).join("");

chat.innerHTML += `

<div class="message bot">

<p>
Here are the best grant opportunities I found for your business:
</p>

<div class="grants-grid">

${cardsHTML}

</div>

</div>

`;

chat.scrollTo({
top: chat.scrollHeight,
behavior:"smooth"
});

}

/* SAVE */

function saveGrant(name){

if(savedGrants.includes(name)){
return;
}

savedGrants.push(name);

localStorage.setItem(
"savedGrants",
JSON.stringify(savedGrants)
);

renderSavedGrants();

}

/* RENDER SAVED */

function renderSavedGrants(){

const container =
document.getElementById("savedContainer");

let html = "";

/* SAVED CONVERSATIONS */

conversations.forEach((conv,index)=>{

html += `

<div
class="saved-card"
onclick="
openConversation(${index})
"
>

<h3>
💬 ${conv.title}
</h3>

<p>
Saved Conversation
</p>

</div>

`;

});

/* SAVED GRANTS */

savedGrants.forEach((grant)=>{

html += `

<div
class="saved-card"
onclick="
openSavedGrant(
'${grant}'
)
"
>

<h3>
⭐ ${grant}
</h3>

<p>
Saved Grant
</p>

</div>

`;

});

container.innerHTML = html;

}

/* OPEN SAVED */

function openSavedGrant(name){

if(name === "SBA Microloan Program"){

openGrantModal(
'SBA Microloan Program',
'$50,000 Funding',
'This grant helps startups and small businesses access working capital and expansion funding.',
'https://www.sba.gov'
);

}

else if(name === "Amber Grant"){

openGrantModal(
'Amber Grant',
'Women-Owned',
'Monthly funding opportunities for women-owned businesses and startups.',
'https://ambergrantsforwomen.com'
);

}

}

/* MODAL */

function openGrantModal(
title,
amount,
desc,
link
){

closeGrantModal();

const modal =
document.createElement("div");

modal.id =
"grantModal";

modal.innerHTML = `

<div class="custom-modal-overlay">

<div class="custom-modal">

<button
class="close-modal"
onclick="closeGrantModal()"
>
✕
</button>

<div class="badge">
${amount}
</div>

<h1 class="modal-title">
${title}
</h1>

<p class="modal-desc">
${desc}
</p>

<div class="modal-actions">

<a
href="${link}"
target="_blank"
class="btn primary"
style="text-decoration:none;"
>
Official Website
</a>

<button
class="btn secondary"
onclick="
downloadPDF(
'${title}'
)
"
>
Download PDF
</button>

</div>

</div>

</div>

`;

document.body.appendChild(modal);

}

/* CLOSE MODAL */

function closeGrantModal(){

const modal =
document.getElementById("grantModal");

if(modal){
modal.remove();
}

}

/* REAL PDF */

async function downloadPDF(name){

try{

const ownerName =
prompt("Enter Owner Name:");

const businessYears =
prompt("Years In Business:");

const businessName =
prompt("Enter Business Name:");

const businessType =
prompt("Enter Business Type:");

const fundingPurpose =
prompt("Enter Funding Purpose:");

const requestedAmount =
prompt("Enter Requested Amount:");

const response = await fetch(
"https://grant-simone-backend-production.up.railway.app/generate-proposal",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

businessName: businessName,
ownerName: ownerName,
businessYears: businessYears,
businessType: businessType,
fundingPurpose: fundingPurpose,
grantName:name,
requestedAmount: requestedAmount

})

}
);

if(!response.ok){

throw new Error("Failed to generate PDF");

}

const blob = await response.blob();

const url =
window.URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download = `${name}.pdf`;

document.body.appendChild(a);

a.click();

a.remove();

window.URL.revokeObjectURL(url);

}catch(error){

console.error(error);

alert("Error generating PDF.");
}
}
function saveConversation(){

const messages =
chat.innerHTML;

const title =
"Conversation " + (conversations.length + 1);

conversations.push({
title,
messages
});

localStorage.setItem(
"conversations",
JSON.stringify(conversations)
);

renderSavedGrants();

}

function openConversation(index){

chat.innerHTML =
conversations[index].messages;
}

renderSavedGrants();
  
</script>
