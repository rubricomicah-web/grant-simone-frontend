<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Grant Simone AI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
}

/* PDF FIX */
iframe{
    width:100%;
    height:100vh;
    border:none;
}

.grant-card{
    background:#0b0b0b;
    border:1px solid rgba(255,215,0,0.15);
    border-radius:25px;
    padding:25px;
    margin-bottom:25px;
    width:300px;
}

button{
    cursor:pointer;
}

/* MODAL */
.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.modal{
    width:90%;
    max-width:600px;
    background:#111;
    border-radius:25px;
    padding:30px;
    border:1px solid rgba(255,215,0,0.15);
}

.modal h2{
    color:#ffd54f;
}

.modal-close{
    margin-top:20px;
    background:#ffd54f;
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    font-weight:bold;
}

</style>
</head>
<body>

<div id="cards-container"></div>

<div id="saved-grants"></div>

<script>

const grants = [
{
    title:"SBA Microloan Program",
    amount:"$50,000 Funding",
    description:"Small business funding for startups and salons.",
    details:`
SBA Microloan Program

• Funding up to $50,000
• Designed for startups and small businesses
• Good for salons and beauty businesses
• Flexible repayment terms
• National U.S. funding program
`
},
{
    title:"Amber Grant",
    amount:"Women-Owned",
    description:"Monthly grants for women entrepreneurs.",
    details:`
Amber Grant

• $10,000 monthly grant
• Women-owned businesses
• Easy online application
• Extra year-end funding opportunities
`
}
];

const cardsContainer = document.getElementById("cards-container");

function renderCards(){

    cardsContainer.innerHTML = "";

    grants.forEach((grant,index)=>{

        cardsContainer.innerHTML += `
        
        <div class="grant-card">

            <div style="
                display:inline-block;
                background:rgba(255,215,0,0.1);
                color:#ffd54f;
                padding:10px 18px;
                border-radius:999px;
                margin-bottom:20px;
                font-weight:bold;
            ">
                ${grant.amount}
            </div>

            <h1 style="margin-top:0;">
                ${grant.title}
            </h1>

            <p style="
                color:#bdbdbd;
                line-height:1.7;
            ">
                ${grant.description}
            </p>

            <div style="
                display:flex;
                gap:10px;
                margin-top:25px;
            ">

                <button onclick="openDetails(${index})"
                    style="
                        background:#ffd54f;
                        border:none;
                        padding:14px 20px;
                        border-radius:14px;
                        font-weight:bold;
                    ">
                    View Details
                </button>

                <button onclick="saveGrant(${index})"
                    style="
                        background:#1a1a1a;
                        color:white;
                        border:none;
                        padding:14px 20px;
                        border-radius:14px;
                    ">
                    Save
                </button>

                <button onclick="downloadPDF(${index})"
                    style="
                        background:#222;
                        color:white;
                        border:none;
                        padding:14px 20px;
                        border-radius:14px;
                    ">
                    PDF
                </button>

            </div>

        </div>

        `;
    });

}

renderCards();

/* VIEW DETAILS */

function openDetails(index){

    const grant = grants[index];

    const modal = document.createElement("div");

    modal.className = "modal-overlay";

    modal.innerHTML = `

        <div class="modal">

            <h2>${grant.title}</h2>

            <p style="
                color:#ccc;
                line-height:1.9;
                white-space:pre-line;
            ">
                ${grant.details}
            </p>

            <button class="modal-close" onclick="closeModal()">
                Close
            </button>

        </div>

    `;

    document.body.appendChild(modal);
}

/* CLOSE MODAL */

function closeModal(){

    const modal = document.querySelector(".modal-overlay");

    if(modal){
        modal.remove();
    }

}

/* SAVE GRANT */

function saveGrant(index){

    const grant = grants[index];

    const savedContainer = document.getElementById("saved-grants");

    const exists = document.getElementById("saved-" + index);

    if(exists){
        return;
    }

    savedContainer.innerHTML += `

        <div id="saved-${index}" style="
            background:#111;
            border:1px solid rgba(255,215,0,0.2);
            padding:15px;
            border-radius:15px;
            margin:15px;
        ">
            ⭐ ${grant.title}
        </div>

    `;

}

/* REAL PDF DOWNLOAD FIX */

async function downloadPDF(index){

    const grant = grants[index];

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    doc.setFontSize(22);
    doc.text(grant.title,20,25);

    doc.setFontSize(14);

    const lines = doc.splitTextToSize(grant.details,170);

    doc.text(lines,20,45);

    doc.save(`${grant.title}.pdf`);

}

</script>

</body>
</html>
