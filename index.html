<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Grant Simone</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:
linear-gradient(
rgba(0,0,0,.82),
rgba(0,0,0,.92)
),
url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

background-size:cover;
background-position:center;
background-attachment:fixed;

min-height:100vh;

color:white;

display:flex;
justify-content:center;
align-items:center;

padding:20px;
overflow:hidden;
}

#app{

width:100%;
max-width:1200px;
height:92vh;

background:
rgba(10,10,10,.45);

backdrop-filter:blur(24px);

border:
1px solid rgba(212,175,55,.12);

border-radius:32px;

box-shadow:
0 20px 80px rgba(0,0,0,.55),
0 0 40px rgba(212,175,55,.08);

display:flex;
flex-direction:column;

overflow:hidden;
position:relative;
}

#app::before{

content:"";

position:absolute;
inset:0;

background:
radial-gradient(
circle at top right,
rgba(212,175,55,.08),
transparent 35%
);

pointer-events:none;
}

/* HEADER */

#header{

padding:24px 28px;

border-bottom:
1px solid rgba(255,255,255,.05);

display:flex;
justify-content:space-between;
align-items:center;

position:relative;
z-index:2;
}

.logo{

display:flex;
align-items:center;
gap:14px;
}

.avatar{

width:52px;
height:52px;

border-radius:50%;

object-fit:cover;

border:
2px solid rgba(212,175,55,.45);

box-shadow:
0 0 24px rgba(212,175,55,.18);

}

.logo h1{

font-size:20px;
font-weight:500;
letter-spacing:-0.5px;
}

.logo p{

font-size:13px;
color:rgba(255,255,255,.55);
margin-top:2px;
}

.status{

padding:12px 16px;

border-radius:16px;

background:
rgba(255,255,255,.03);

border:
1px solid rgba(212,175,55,.12);

font-size:13px;

color:#d4af37;
}

/* CHAT */

#chat-container{

flex:1;

overflow-y:auto;

padding:30px;

scroll-behavior:smooth;

position:relative;
z-index:2;
}

.message{

margin-bottom:24px;
display:flex;
}

.message.user{
justify-content:flex-end;
}

.message.ai{
justify-content:flex-start;
}

.bubble{

max-width:75%;

padding:18px 20px;

border-radius:22px;

line-height:1.8;

font-size:15px;

white-space:pre-wrap;
}

.user .bubble{

background:#d4af37;
color:black;

border-bottom-right-radius:6px;

font-weight:500;
}

.ai .bubble{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.06);

border-bottom-left-radius:6px;

color:rgba(255,255,255,.92);

backdrop-filter:blur(10px);
}

/* INPUT */

#input-area{

padding:22px 24px;

border-top:
1px solid rgba(255,255,255,.05);

position:relative;
z-index:2;
}

#input-wrapper{

display:flex;
align-items:flex-end;
gap:14px;

padding:14px 16px;

border-radius:24px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(212,175,55,.10);

backdrop-filter:blur(10px);
}

textarea{

flex:1;

background:transparent;
border:none;
outline:none;
resize:none;

max-height:180px;
min-height:28px;

font-size:15px;
line-height:1.7;

color:white;

font-family:'Inter',sans-serif;
}

textarea::placeholder{
color:rgba(255,255,255,.35);
}

button{

width:54px;
height:54px;

border:none;

border-radius:50%;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:22px;
font-weight:700;

cursor:pointer;

transition:.25s ease;

flex-shrink:0;
}

button:hover{

transform:scale(1.05);
}

/* TYPING */

.typing{

display:flex;
gap:6px;
padding:4px 0;
}

.typing span{

width:8px;
height:8px;

border-radius:50%;

background:#d4af37;

animation:bounce 1.4s infinite;
}

.typing span:nth-child(2){
animation-delay:.2s;
}

.typing span:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{

0%,80%,100%{
transform:scale(0);
opacity:.4;
}

40%{
transform:scale(1);
opacity:1;
}
}

/* MOBILE */

@media(max-width:768px){

#app{
height:100vh;
border-radius:0;
}

#header{
padding:18px;
}

#chat-container{
padding:18px;
}

.bubble{
max-width:92%;
font-size:14px;
}

#input-area{
padding:16px;
}

button{
width:48px;
height:48px;
}

}

</style>

</head>

<body>

<div id="app">

<div id="header">

<div class="logo">

<img
class="avatar"
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>
<h1>Grant Simone</h1>
<p>AI Grant Funding Consultant</p>
</div>

</div>

<div class="status">
● Online
</div>

</div>

<div id="chat-container"></div>

<div id="input-area">

<div id="input-wrapper">

<textarea
id="messageInput"
placeholder="Ask about grants, funding opportunities, or proposal generation..."
rows="1"
></textarea>

<button id="sendBtn">
↑
</button>

</div>

</div>

</div>

<script>

const API_BASE =
"https://grant-agent-backend-production.up.railway.app";

const chatContainer =
document.getElementById("chat-container");

const input =
document.getElementById("messageInput");

const sendBtn =
document.getElementById("sendBtn");

/* AUTO RESIZE */

input.addEventListener("input",()=>{

input.style.height="auto";
input.style.height=
input.scrollHeight + "px";

});

/* ADD MESSAGE */

function addMessage(text,type){

const wrapper =
document.createElement("div");

wrapper.className =
`message ${type}`;

const bubble =
document.createElement("div");

bubble.className =
"bubble";

bubble.innerText = text;

wrapper.appendChild(bubble);

chatContainer.appendChild(wrapper);

chatContainer.scrollTop =
chatContainer.scrollHeight;

}

/* TYPING */

function showTyping(){

const wrapper =
document.createElement("div");

wrapper.className =
"message ai";

wrapper.id = "typing";

wrapper.innerHTML = `
<div class="bubble">
<div class="typing">
<span></span>
<span></span>
<span></span>
</div>
</div>
`;

chatContainer.appendChild(wrapper);

chatContainer.scrollTop =
chatContainer.scrollHeight;

}

function removeTyping(){

const typing =
document.getElementById("typing");

if(typing){
typing.remove();
}

}

/* DETECT PROPOSAL */

function isProposal(text){

return (
text.toLowerCase().includes("proposal") ||
text.toLowerCase().includes("grant proposal")
);

}

/* SEND MESSAGE */

async function sendMessage(){

const message =
input.value.trim();

if(!message) return;

addMessage(message,"user");

input.value="";
input.style.height="auto";

showTyping();

try{

let endpoint =
"/grant-search";

let payload = {

businessType:"business or nonprofit organization",
state:"United States",
keywords:message

};

if(isProposal(message)){

endpoint =
"/generate-proposal";

payload = {

businessName:
"Business",

businessType:
"Small Business",

fundingPurpose:
"Business Growth",

grantName:
message

};

}

const response =
await fetch(
API_BASE + endpoint,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

signal: AbortSignal.timeout(30000),

body:JSON.stringify(payload)
}
);

const data =
await response.json();

removeTyping();

if(endpoint === "/grant-search"){

if(Array.isArray(data.grants) && data.grants.length){

let formatted = "";

data.grants.forEach(grant=>{

formatted +=
`Grant Name:
${grant.grantName || "Verified Grant Opportunity"}

Funding Amount:
${grant.amount || "Varies"}

Purpose:
${grant.purpose || "Business growth and operational support"}

Eligibility:
${grant.eligibility || "See application requirements"}

Application Link:
${grant.applicationUrl || "Not Available"}

Recommendation:
${grant.recommendation || "Strong Match"}

`;
});

addMessage(formatted,"ai");

}else if(data.response){

addMessage(data.response,"ai");

}else if(data.message){

addMessage(data.message,"ai");

}else{

addMessage(
"No verified grants found at the moment.",
"ai"
);

}

}else{

addMessage(
data.proposalNarrative ||
"Proposal generated successfully.",
"ai"
);

}

}catch(error){

removeTyping();

addMessage(
"Grant Simone is currently preparing your funding recommendations. Please try again in a moment.",
"ai"
);

}

}

/* BUTTON */

sendBtn.addEventListener(
"click",
sendMessage
);

/* ENTER */

input.addEventListener(
"keydown",
(e)=>{

if(e.key==="Enter" && !e.shiftKey){

e.preventDefault();

sendMessage();

}

}
);

</script>

</body>

</html>
