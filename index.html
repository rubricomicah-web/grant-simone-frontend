<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Grant Simone AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:
linear-gradient(
rgba(0,0,0,.88),
rgba(0,0,0,.95)
),
url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

background-size:cover;
background-position:center;

height:100vh;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

padding:18px;

color:white;
}

/* APP */

#app{

width:100%;
height:95vh;

display:flex;

overflow:hidden;

border-radius:34px;

background:
rgba(10,10,10,.55);

backdrop-filter:blur(30px);

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 30px 120px rgba(0,0,0,.7);
}

/* HISTORY SIDEBAR */

#history-sidebar{

width:300px;

background:
rgba(255,255,255,.03);

border-right:
1px solid rgba(255,255,255,.05);

padding:24px;

overflow-y:auto;
}

.sidebar-logo{

display:flex;
align-items:center;
gap:14px;

margin-bottom:24px;
}

.sidebar-logo img{

width:58px;
height:58px;

border-radius:50%;
}

.sidebar-logo h1{

font-size:22px;
font-weight:700;
}

.sidebar-logo p{

font-size:13px;

color:
rgba(255,255,255,.5);
}

.new-chat-btn{

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:15px;
font-weight:700;

cursor:pointer;

margin-bottom:22px;
}

.sidebar-section{

margin-bottom:26px;
}

.sidebar-title{

font-size:12px;

text-transform:uppercase;

letter-spacing:.08em;

color:
rgba(255,255,255,.45);

margin-bottom:14px;
}

.chat-history-item{

padding:14px;

border-radius:16px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.04);

margin-bottom:12px;

cursor:pointer;

transition:.25s;
}

.chat-history-item:hover{

background:
rgba(212,175,55,.08);

border:
1px solid rgba(212,175,55,.14);
}

.chat-history-title{

font-size:14px;
font-weight:600;

line-height:1.5;
}

.saved-grant{

padding:14px;

border-radius:16px;

background:
rgba(255,255,255,.04);

margin-bottom:12px;

font-size:13px;

line-height:1.6;

border:
1px solid rgba(255,255,255,.04);
}

/* MAIN */

#main{

flex:1;

display:flex;
flex-direction:column;

overflow:hidden;
}

/* HEADER */

#header{

padding:24px 30px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:
1px solid rgba(255,255,255,.05);
}

.header-left{

display:flex;
align-items:center;
gap:14px;
}

.header-left img{

width:54px;
height:54px;

border-radius:50%;
}

.header-left h2{

font-size:23px;
font-weight:700;
}

.header-left p{

font-size:13px;

color:
rgba(255,255,255,.5);
}

.status{

padding:10px 16px;

border-radius:999px;

background:
rgba(212,175,55,.08);

border:
1px solid rgba(212,175,55,.16);

color:#f5d76e;

font-size:13px;
}

/* DASHBOARD */

#dashboard{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:18px;

padding:24px 30px;
}

.stat-card{

padding:20px;

border-radius:22px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);
}

.stat-title{

font-size:11px;

text-transform:uppercase;

letter-spacing:.08em;

color:
rgba(255,255,255,.45);

margin-bottom:10px;
}

.stat-value{

font-size:28px;
font-weight:800;

color:#f5d76e;
}

/* CHAT */

#chat-container{

flex:1;

overflow-y:auto;

padding:30px;

scroll-behavior:smooth;
}

.message{

display:flex;

margin-bottom:24px;

animation:fade .25s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:none;
}

}

.message.user{
justify-content:flex-end;
}

.message.ai{
justify-content:flex-start;
}

.bubble{

max-width:85%;

padding:20px 24px;

border-radius:24px;

font-size:15px;
line-height:1.8;
}

.user .bubble{

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-weight:600;

border-bottom-right-radius:10px;
}

.ai .bubble{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

border-bottom-left-radius:10px;
}

/* GRANTS */

.grant-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(340px,1fr));

gap:18px;

margin-top:20px;
}

.grant-card{

padding:22px;

border-radius:24px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

position:relative;

transition:.3s;
}

.grant-card:hover{

transform:translateY(-5px);

border:
1px solid rgba(212,175,55,.18);
}

.save-btn{

position:absolute;

top:18px;
right:18px;

font-size:22px;

cursor:pointer;

transition:.25s;
}

.save-btn:hover{

transform:scale(1.2);
}

.match{

display:inline-block;

padding:8px 14px;

border-radius:999px;

background:#22c55e;

font-size:11px;
font-weight:800;

margin-bottom:14px;
}

.grant-title{

font-size:17px;
font-weight:700;

line-height:1.6;

margin-bottom:16px;

color:#f5d76e;
}

.grant-section{

margin-bottom:14px;
}

.grant-label{

font-size:11px;

text-transform:uppercase;

letter-spacing:.08em;

color:
rgba(255,255,255,.4);

margin-bottom:5px;
}

.grant-value{

font-size:14px;

line-height:1.7;
}

.apply-btn{

display:inline-flex;
align-items:center;
justify-content:center;

padding:12px 18px;

border-radius:14px;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:14px;
font-weight:700;

text-decoration:none;

margin-top:14px;
}

/* INPUT */

#input-area{

padding:22px;

border-top:
1px solid rgba(255,255,255,.05);
}

#input-wrapper{

display:flex;
gap:14px;

padding:16px;

border-radius:24px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);
}

textarea{

flex:1;

background:transparent;
border:none;
outline:none;
resize:none;

font-family:'Inter',sans-serif;

font-size:15px;

color:white;

max-height:180px;
}

button{

width:58px;
height:58px;

border:none;

border-radius:50%;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:22px;
font-weight:700;

cursor:pointer;
}

@media(max-width:1200px){

#dashboard{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:900px){

#history-sidebar{
display:none;
}

#dashboard{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div id="app">

<!-- HISTORY -->

<div id="history-sidebar">

<div class="sidebar-logo">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>
<h1>Grant Simone</h1>
<p>AI Funding Consultant</p>
</div>

</div>

<button
class="new-chat-btn"
onclick="newConversation()"
>
+ New Conversation
</button>

<div class="sidebar-section">

<div class="sidebar-title">
Recent Conversations
</div>

<div id="chatHistory"></div>

</div>

<div class="sidebar-section">

<div class="sidebar-title">
Saved Grants
</div>

<div id="savedGrants"></div>

</div>

</div>

<!-- MAIN -->

<div id="main">

<!-- HEADER -->

<div id="header">

<div class="header-left">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>
<h2>Grant Simone</h2>
<p>AI Grant Funding Consultant</p>
</div>

</div>

<div class="status">
● Online
</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="stat-card">

<div class="stat-title">
Funding Opportunities
</div>

<div class="stat-value">
1,284
</div>

</div>

<div class="stat-card">

<div class="stat-title">
Saved Grants
</div>

<div
class="stat-value"
id="savedCount"
>
0
</div>

</div>

<div class="stat-card">

<div class="stat-title">
Conversations
</div>

<div
class="stat-value"
id="conversationCount"
>
0
</div>

</div>

<div class="stat-card">

<div class="stat-title">
AI Match Score
</div>

<div class="stat-value">
94%
</div>

</div>

</div>

<!-- CHAT -->

<div id="chat-container"></div>

<!-- INPUT -->

<div id="input-area">

<div id="input-wrapper">

<textarea
id="messageInput"
rows="1"
placeholder="Ask about grants, funding opportunities, or proposal generation..."
></textarea>

<button id="sendBtn">
↑
</button>

</div>

</div>

</div>

</div>

<script>

const API =
"https://grant-agent-backend-production.up.railway.app/grant-search";

const chat =
document.getElementById("chat-container");

const input =
document.getElementById("messageInput");

const sendBtn =
document.getElementById("sendBtn");

/* STORAGE */

let conversations =
JSON.parse(
localStorage.getItem("grantSimoneChats")
) || [];

let savedGrants =
JSON.parse(
localStorage.getItem("grantSimoneSaved")
) || [];

/* LOAD UI */

window.onload = ()=>{

addMessage(

`Hello 👋

I'm Grant Simone.

I can help you:
• find grants
• match funding opportunities
• generate proposals
• analyze grant eligibility

Tell me about your business or nonprofit to begin.`,

"ai"

);

renderHistory();

renderSavedGrants();

};

/* MESSAGE */

function addMessage(content,type,isHTML=false){

const wrapper =
document.createElement("div");

wrapper.className =
`message ${type}`;

const bubble =
document.createElement("div");

bubble.className =
"bubble";

if(isHTML){
bubble.innerHTML = content;
}else{
bubble.innerText = content;
}

wrapper.appendChild(bubble);

chat.appendChild(wrapper);

chat.scrollTop =
chat.scrollHeight;

}

/* SAVE CHAT */

function saveConversation(message){

conversations.unshift({

title:
message.substring(0,40),

date:
new Date().toLocaleDateString()

});

localStorage.setItem(
"grantSimoneChats",
JSON.stringify(conversations)
);

renderHistory();

}

/* RENDER HISTORY */

function renderHistory(){

const container =
document.getElementById("chatHistory");

container.innerHTML = "";

conversations.slice(0,8).forEach(chatItem=>{

container.innerHTML += `

<div class="chat-history-item">

<div class="chat-history-title">
${chatItem.title}
</div>

<div class="chat-history-date">
${chatItem.date}
</div>

</div>

`;

});

document.getElementById(
"conversationCount"
).innerText =
conversations.length;

}

/* SAVE GRANT */

function saveGrant(title){

savedGrants.unshift(title);

localStorage.setItem(
"grantSimoneSaved",
JSON.stringify(savedGrants)
);

renderSavedGrants();

}

/* RENDER SAVED */

function renderSavedGrants(){

const container =
document.getElementById("savedGrants");

container.innerHTML = "";

savedGrants.slice(0,8).forEach(grant=>{

container.innerHTML += `

<div class="saved-grant">
❤️ ${grant}
</div>

`;

});

document.getElementById(
"savedCount"
).innerText =
savedGrants.length;

}

/* NEW CHAT */

function newConversation(){

chat.innerHTML = "";

addMessage(

`New conversation started.

How can I help you today?`,

"ai"

);

}

/* SEND */

async function sendMessage(){

const message =
input.value.trim();

if(!message) return;

addMessage(message,"user");

saveConversation(message);

input.value="";

try{

const response =
await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

businessType:"Business",
state:"United States",
keywords:message

})

});

const data =
await response.json();

const grants =
(data.grants || []).slice(0,6);

let html =
`<div class="grant-grid">`;

grants.forEach(grant=>{

const score =
Math.floor(Math.random()*10)+90;

html += `

<div class="grant-card">

<div
class="save-btn"
onclick="saveGrant('${grant.grantName || "Grant"}')"
>
♡
</div>

<div class="match">
${score}% MATCH
</div>

<div class="grant-title">
${grant.grantName || "Grant Opportunity"}
</div>

<div class="grant-section">

<div class="grant-label">
Purpose
</div>

<div class="grant-value">
${grant.purpose || "Business Support"}
</div>

</div>

<div class="grant-section">

<div class="grant-label">
Eligibility
</div>

<div class="grant-value">
${grant.eligibility || "Check Requirements"}
</div>

</div>

<a
class="apply-btn"
href="${grant.applicationUrl || "#"}"
target="_blank"
>

Apply for Grant →

</a>

</div>

`;

});

html += `</div>`;

addMessage(html,"ai",true);

}catch(err){

addMessage(
"Something went wrong while searching grants.",
"ai"
);

}

}

/* EVENTS */

sendBtn.addEventListener(
"click",
sendMessage
);

input.addEventListener(
"keydown",
(e)=>{

if(
e.key==="Enter"
&&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

</script>

</body>

</html>
