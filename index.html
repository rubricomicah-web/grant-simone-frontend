<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Grant Simone AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    min-height:100dvh;

    overflow-x:hidden;

    background:#000;

    font-family:
    Inter,
    sans-serif;

    color:white;
}

/* BACKGROUND */

body{

    background:
    linear-gradient(
        rgba(0,0,0,0.88),
        rgba(0,0,0,0.95)
    ),
    url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* APP */

.app{

    display:flex;

    min-height:100dvh;
}

/* SIDEBAR */

.sidebar{

    width:320px;

    background:
    rgba(0,0,0,0.78);

    border-right:
    1px solid rgba(255,255,255,0.05);

    padding:24px;

    overflow-y:auto;
}

.logo{

    display:flex;
    align-items:center;
    gap:14px;

    margin-bottom:30px;
}

.logo img{

    width:58px;
    height:58px;

    border-radius:50%;
    object-fit:cover;
}

.logo h2{

    font-size:34px;
    line-height:1;
}

.logo p{

    color:#999;
    margin-top:6px;
}

.new-chat{

    width:100%;

    background:#FFD54F;

    color:black;

    border:none;

    padding:18px;

    border-radius:18px;

    font-weight:700;
    font-size:18px;

    cursor:pointer;

    margin-bottom:28px;
}

.section-title{

    color:#777;

    font-size:12px;

    letter-spacing:2px;

    margin-bottom:16px;
    margin-top:26px;
}

.history-list{

    display:flex;
    flex-direction:column;
    gap:14px;
}

.history-item{

    background:
    rgba(255,255,255,0.04);

    border:
    1px solid rgba(255,255,255,0.05);

    padding:18px;

    border-radius:18px;

    cursor:pointer;

    transition:0.3s;
}

.history-item:hover{

    border-color:#FFD54F;
}

/* MAIN */

.main{

    flex:1;

    display:flex;
    flex-direction:column;

    min-height:100dvh;
}

/* TOPBAR */

.topbar{

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:22px 34px;

    border-bottom:
    1px solid rgba(255,255,255,0.05);

    background:
    rgba(0,0,0,0.45);
}

.top-left{

    display:flex;
    align-items:center;
    gap:14px;
}

.top-left img{

    width:54px;
    height:54px;

    border-radius:50%;
}

.top-left h2{

    font-size:28px;
}

.top-left p{

    color:#999;
}

.online{

    background:
    rgba(255,213,79,0.08);

    border:
    1px solid rgba(255,213,79,0.2);

    color:#FFD54F;

    padding:12px 22px;

    border-radius:999px;
}

/* CHAT */

.chat-area{

    flex:1;

    overflow-y:auto;

    padding:34px;

    padding-bottom:140px;
}

.assistant-message{

    max-width:760px;

    background:
    rgba(255,255,255,0.04);

    border:
    1px solid rgba(255,255,255,0.05);

    border-radius:30px;

    padding:30px;
}

.assistant-message p{

    font-size:17px;
    line-height:1.9;

    color:#ddd;
}

/* INPUT */

.input-area{

    position:sticky;

    bottom:0;

    padding:24px 34px;

    background:
    linear-gradient(
        to top,
        rgba(0,0,0,0.95),
        transparent
    );
}

.input-wrapper{

    display:flex;
    align-items:center;
    gap:14px;

    background:
    rgba(255,255,255,0.04);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:999px;

    padding:12px;
}

.input-wrapper input{

    flex:1;

    background:transparent;

    border:none;
    outline:none;

    color:white;

    font-size:18px;

    padding:14px;
}

.send-btn{

    width:62px;
    height:62px;

    border-radius:50%;

    border:none;

    background:#FFD54F;

    color:black;

    font-size:24px;

    cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

    .sidebar{
        display:none;
    }

    .app{
        display:block;
    }

    .main{
        min-height:100dvh;
    }

    .topbar{

        padding:16px;
    }

    .top-left img{

        width:52px;
        height:52px;
    }

    .top-left h2{

        font-size:20px;
    }

    .top-left p{

        font-size:12px;
    }

    .online{

        padding:10px 16px;

        font-size:14px;
    }

    .chat-area{

        padding:18px;

        padding-bottom:150px;
    }

    .assistant-message{

        padding:24px;

        border-radius:26px;
    }

    .assistant-message p{

        font-size:18px;
        line-height:1.8;
    }

    .input-area{

        position:fixed;

        left:0;
        right:0;
        bottom:0;

        z-index:999;

        padding:14px;

        padding-bottom:
        calc(
            14px + env(safe-area-inset-bottom)
        );

        background:
        linear-gradient(
            to top,
            rgba(0,0,0,0.98),
            rgba(0,0,0,0.8)
        );

        backdrop-filter:blur(20px);
    }

    .input-wrapper{

        padding:10px;
    }

    .input-wrapper input{

        font-size:16px;
    }

    .send-btn{

        width:56px;
        height:56px;
    }

}

</style>

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">

            <img
            src="https://raw.githubusercontent.com/rubricomicah-web/grant-simone-frontend/main/Grant%20Simone.jpeg"
            >

            <div>

                <h2>Grant Simone</h2>

                <p>
                    AI Grant Funding Consultant
                </p>

            </div>

        </div>

        <button class="new-chat">

            + New Conversation

        </button>

        <div class="section-title">

            RECENT CONVERSATIONS

        </div>

        <div class="history-list">

            <div class="history-item">

                Help me find grants

            </div>

            <div class="history-item">

                Startup funding

            </div>

        </div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <div class="topbar">

            <div class="top-left">

                <img
                src="https://raw.githubusercontent.com/rubricomicah-web/grant-simone-frontend/main/Grant%20Simone.jpeg"
                >

                <div>

                    <h2>Grant Simone</h2>

                    <p>
                        AI Grant Funding Consultant
                    </p>

                </div>

            </div>

            <div class="online">

                ● Online

            </div>

        </div>

        <!-- CHAT -->

        <div class="chat-area">

            <div class="assistant-message">

                <p>

                    Hi! I'm Grant Simone.

                    <br><br>

                    Tell me about your business,
                    nonprofit,
                    startup,
                    or funding goals
                    and I'll help you find
                    the best grants available.

                </p>

            </div>

        </div>

        <!-- INPUT -->

        <div class="input-area">

            <div class="input-wrapper">

                <input
                type="text"
                placeholder="Ask about grants, funding, nonprofits..."
                >

                <button class="send-btn">

                    ↑

                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
