<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Grant Simone AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100dvh;
    background:#000;
    overflow:hidden;
    font-family:Inter,sans-serif;
    color:white;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    linear-gradient(
        rgba(0,0,0,0.88),
        rgba(0,0,0,0.96)
    ),
    url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

    background-size:cover;
    background-position:center;

    z-index:-1;
}

.app{
    display:flex;
    height:100dvh;
}

/* SIDEBAR */

.sidebar{
    width:320px;
    background:rgba(0,0,0,0.82);
    border-right:1px solid rgba(255,255,255,0.05);
    padding:24px;
    overflow-y:auto;
}

.logo{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:28px;
}

.logo img{
    width:58px;
    height:58px;
    border-radius:50%;
    object-fit:cover;
}

.logo h2{
    font-size:34px;
    line-height:1;
}

.logo p{
    color:#888;
    margin-top:6px;
}

.new-chat{
    width:100%;
    border:none;
    background:#FFD54F;
    color:black;
    font-weight:700;
    font-size:18px;
    padding:18px;
    border-radius:18px;
    cursor:pointer;
    margin-bottom:30px;
}

.section-title{
    color:#777;
    font-size:12px;
    letter-spacing:2px;
    margin-bottom:14px;
}

.history-list{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.history-item{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.05);
    padding:18px;
    border-radius:18px;
    cursor:pointer;
    transition:0.3s;
}

.history-item:hover{
    border-color:#FFD54F;
}

/* MAIN */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100dvh;
}

/* TOPBAR */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:22px 34px;

    border-bottom:
    1px solid rgba(255,255,255,0.05);

    background:
    rgba(0,0,0,0.4);
}

.top-left{
    display:flex;
    align-items:center;
    gap:14px;
}

.top-left img{
    width:54px;
    height:54px;
    border-radius:50%;
}

.top-left h2{
    font-size:28px;
}

.top-left p{
    color:#888;
}

.online{
    background:
    rgba(255,213,79,0.08);

    border:
    1px solid rgba(255,213,79,0.2);

    color:#FFD54F;

    padding:12px 22px;

    border-radius:999px;
}

/* CHAT */

.chat-area{
    flex:1;
    overflow-y:auto;
    padding:34px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.message{
    max-width:760px;
    padding:28px;
    border-radius:28px;
    line-height:1.9;
    font-size:17px;
}

.assistant{
    background:
    rgba(255,255,255,0.04);

    border:
    1px solid rgba(255,255,255,0.05);

    align-self:flex-start;
}

.user{
    background:#FFD54F;
    color:black;
    align-self:flex-end;
    font-weight:600;
}

/* INPUT */

.input-area{
    padding:20px 30px;
    background:
    linear-gradient(
        to top,
        rgba(0,0,0,0.96),
        transparent
    );
}

.input-wrapper{
    display:flex;
    align-items:center;
    gap:12px;

    background:
    rgba(255,255,255,0.04);

    border:
    1px solid rgba(255,255,255,0.06);

    border-radius:999px;

    padding:12px;
}

.input-wrapper input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:18px;
    padding:12px;
}

.send-btn{
    width:62px;
    height:62px;
    border-radius:50%;
    border:none;
    background:#FFD54F;
    color:black;
    font-size:26px;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

    .sidebar{
        display:none;
    }

    .topbar{
        padding:18px;
    }

    .top-left img{
        width:50px;
        height:50px;
    }

    .top-left h2{
        font-size:20px;
    }

    .top-left p{
        font-size:12px;
    }

    .online{
        padding:10px 16px;
        font-size:14px;
    }

    .chat-area{
        padding:18px;
        padding-bottom:140px;
    }

    .message{
        font-size:18px;
        padding:24px;
    }

    .input-area{
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        z-index:99999;

        padding:14px;

        padding-bottom:
        calc(
            14px + env(safe-area-inset-bottom)
        );

        background:
        rgba(0,0,0,0.95);

        backdrop-filter:blur(20px);
    }

    .send-btn{
        width:58px;
        height:58px;
    }

}

</style>

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">

            <img
            src="https://raw.githubusercontent.com/rubricomicah-web/grant-simone-frontend/main/Grant%20Simone.jpeg"
            >

            <div>

                <h2>Grant Simone</h2>

                <p>
                    AI Grant Funding Consultant
                </p>

            </div>

        </div>

        <button class="new-chat">

            + New Conversation

        </button>

        <div class="section-title">

            RECENT CONVERSATIONS

        </div>

        <div class="history-list">

            <div class="history-item">
                Help me find grants
            </div>

            <div class="history-item">
                Startup funding
            </div>

        </div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <div class="topbar">

            <div class="top-left">

                <img
                src="https://raw.githubusercontent.com/rubricomicah-web/grant-simone-frontend/main/Grant%20Simone.jpeg"
                >

                <div>

                    <h2>Grant Simone</h2>

                    <p>
                        AI Grant Funding Consultant
                    </p>

                </div>

            </div>

            <div class="online">

                ● Online

            </div>

        </div>

        <!-- CHAT -->

        <div
        class="chat-area"
        id="chatArea"
        >

            <div class="message assistant">

                Hi! I'm Grant Simone.

                <br><br>

                Tell me about your business,
                nonprofit,
                startup,
                or funding goals
                and I'll help you find
                the best grants available.

            </div>

        </div>

        <!-- INPUT -->

        <div class="input-area">

            <div class="input-wrapper">

                <input
                type="text"
                id="chatInput"
                placeholder="Ask about grants, funding, nonprofits..."
                >

                <button
                class="send-btn"
                id="sendBtn"
                >

                    ↑

                </button>

            </div>

        </div>

    </div>

</div>

<script>

/* ELEMENTS */

const chatInput =
document.getElementById("chatInput");

const sendBtn =
document.getElementById("sendBtn");

const chatArea =
document.getElementById("chatArea");

/* SEND MESSAGE */

async function sendMessage(){

    const message =
    chatInput.value.trim();

    if(!message) return;

    /* USER MESSAGE */

    const userDiv =
    document.createElement("div");

    userDiv.className =
    "message user";

    userDiv.innerHTML =
    message;

    chatArea.appendChild(userDiv);

    /* CLEAR INPUT */

    chatInput.value = "";

    /* AI LOADING */

    const aiDiv =
    document.createElement("div");

    aiDiv.className =
    "message assistant";

    aiDiv.innerHTML =
    "Grant Simone is thinking...";

    chatArea.appendChild(aiDiv);

    /* AUTO SCROLL */

    chatArea.scrollTop =
    chatArea.scrollHeight;

    try{

        const response =
        await fetch(
            "https://grant-simone-backend-production.up.railway.app/chat",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    message:message
                })
            }
        );

        const data =
        await response.json();

        aiDiv.innerHTML =
        data.response || "No response";

    }catch(error){

        aiDiv.innerHTML =
        "Backend connection failed.";

    }

    chatArea.scrollTop =
    chatArea.scrollHeight;
}

/* BUTTON CLICK */

sendBtn.addEventListener(
    "click",
    sendMessage
);

/* ENTER KEY */

chatInput.addEventListener(
    "keydown",
    function(e){

        if(e.key === "Enter"){

            e.preventDefault();

            sendMessage();
        }

    }
);

</script>

</body>
</html>
