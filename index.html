<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Grant Simone</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:#000;
color:white;
overflow-x:hidden;

text-rendering:optimizeLegibility;

background-image:

linear-gradient(
rgba(0,0,0,0.82),
rgba(0,0,0,0.88)
),

url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

}

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{

width:320px;

background:
rgba(5,5,5,0.82);

backdrop-filter:blur(14px);

border-right:
1px solid rgba(255,255,255,0.05);

padding:24px;

overflow-y:auto;

}

.logo{

display:flex;
align-items:center;
gap:14px;

margin-bottom:28px;

}

.logo img{

width:62px;
height:62px;

border-radius:50%;

object-fit:cover;

}

.logo h1{
font-size:18px;
font-weight:800;
}

.logo p{
color:#999;
margin-top:6px;
}

.new-chat{

width:100%;

padding:14px 18px;

border:none;

border-radius:16px;

background:#FFD54F;

font-size:16px;
font-weight:700;

cursor:pointer;

margin-bottom:24px;

}

.sidebar-title{

font-size:12px;

letter-spacing:2px;

color:#666;

margin-bottom:16px;
}

.saved-card{

background:#0d0d0d;

border:
1px solid rgba(255,213,79,0.12);

border-radius:20px;

padding:18px;

margin-bottom:16px;

cursor:pointer;

}

.saved-card:hover{
border-color:#FFD54F;
}

.saved-card h3{
font-size:18px;
margin-bottom:8px;
}

.saved-card p{
color:#777;
font-size:14px;
}

/* MAIN */

.main{

height:100dvh;

display:flex;

flex-direction:column;

width:100%;

overflow:hidden;

}

.topbar{

padding:16px 24px;

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:
1px solid rgba(255,255,255,0.05);

background:
rgba(5,5,5,0.45);

backdrop-filter:blur(12px);

}

.top-left{

display:flex;
align-items:center;
gap:14px;

}

.top-left img{

width:48px;
height:48px;

border-radius:50%;

object-fit:cover;

}

.top-left h1{
font-size:18px;
font-weight:700;
}

.top-left p{
color:#999;
font-size:13px;
margin-top:4px;
}

.online{

padding:8px 16px;

border-radius:999px;

border:
1px solid rgba(255,213,79,0.2);

background:
rgba(255,213,79,0.08);

color:#FFD54F;

font-size:14px;

font-weight:600;

}

/* CHAT */

.chat{

flex:1;

overflow-y:auto;

scrollbar-gutter:stable;

scroll-behavior:smooth;

padding:40px 40px 220px 40px;

min-height:0;

display:flex;

flex-direction:column;

align-items:center;

width:100%;

}

.chat > *{

width:100%;
max-width:1200px;

}

.hero-message{

width:100%;
max-width:920px;

}

.message{

max-width:920px;

width:100%;

padding:28px;

border-radius:30px;

margin-bottom:24px;

line-height:1.9;

font-size:18px;

word-wrap:break-word;

overflow-wrap:break-word;

}

.bot{

background:
rgba(10,10,10,0.55);

backdrop-filter:blur(12px);

border:
1px solid rgba(255,255,255,0.05);

}

.user{

background:#FFD54F;

color:black;

margin-left:auto;

font-weight:bold;

}

/* GRANTS */

.grants-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(420px,1fr));

gap:28px;

margin-top:24px;

width:100%;

align-items:start;

}

.grant-card{

background:
rgba(10,10,10,0.55);

backdrop-filter:blur(14px);

border:
1px solid rgba(255,213,79,0.12);

border-radius:30px;

padding:28px;

transition:0.25s;

}

.grant-card:hover{

transform:translateY(-4px);

border-color:#FFD54F;


}

.badge{

display:inline-block;

padding:10px 18px;

border-radius:999px;

background:
rgba(255,213,79,0.08);

border:
1px solid rgba(255,213,79,0.14);

color:#FFD54F;

margin-bottom:22px;

}

.grant-title{

font-size:22px;

font-weight:bold;

margin-bottom:18px;

}

.grant-desc{

color:#bbb;

line-height:1.8;

margin-bottom:28px;

}

.actions{

display:flex;

gap:12px;

flex-wrap:wrap;

}

.btn{

padding:14px 20px;

border:none;

border-radius:16px;

cursor:pointer;

font-size:16px;
font-weight:bold;

}

.primary{

background:#FFD54F;

color:black;

}

.secondary{

background:#1b1b1b;

color:white;

}

/* INPUT */

.input-area{

position:fixed;

bottom:14px;

left:320px;
right:0;

padding:0 32px 0 40px;

background:transparent;

z-index:9999;

}

.input-wrap{

display:flex;

align-items:center;

gap:10px;

max-width:1000px;

margin:0 auto;

padding:14px 16px;

border-radius:32px;

background:
rgba(10,10,10,0.82);

backdrop-filter:blur(16px);

border:
1px solid rgba(255,255,255,0.06);

box-shadow:
0 8px 40px rgba(0,0,0,0.45);

}

.input-wrap textarea{

flex:1;

background:none;

border:none;

outline:none;

color:white;

font-size:16px !important;

padding:14px 10px;

resize:none;

overflow-y:auto;

min-height:52px;

height:52px;

max-height:140px;

line-height:1.6;

}

.send-btn{

width:56px;
height:56px;

border:none;

border-radius:50%;

background:#FFD54F;

font-size:24px;

font-weight:bold;

cursor:pointer;

}

/* MOBILE */

@media(max-width:900px){

.input-area{
left:0;
padding:0 12px;
}

.chat{
padding:24px 14px 180px 14px;
}

.app{
flex-direction:column;
}

.sidebar{
display:none;
}

.message{
font-size:15px;
padding:16px;
border-radius:22px;
}

.bot{
max-width:92%;
}

.user{
max-width:88%;
}

.grants-grid{
grid-template-columns:1fr;
}

.input-wrap textarea{
font-size:16px !important;
}

}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<div class="logo">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>

<h1>Grant Simone</h1>

<p>
AI Grant Funding Consultant
</p>

</div>

</div>

<button
class="new-chat"
onclick="startNewConversation()"
>
+ New Conversation
</button>

<div class="sidebar-title">
RECENT CONVERSATIONS
</div>

<div id="savedContainer"></div>

</div>

<div class="main">

<div class="topbar">

<div class="top-left">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>

<h1>Grant Simone</h1>

<p>
AI Grant Funding Consultant
</p>

</div>

</div>

<div class="online">
● Online
</div>

</div>

<div
class="chat"
id="chat"
>

<div class="message bot hero-message">

Hi! I'm Grant Simone.

<br><br>

Tell me about your business,
nonprofit,
startup,
or funding goals
and I'll help you find
the best grants available.

</div>

</div>

<div class="input-area">

<div class="input-wrap">

<select id="stateSelect" style="
background:#111;
color:white;
border:none;
padding:12px;
border-radius:12px;
margin-right:10px;
">

<option value="USA">All USA</option>
<option value="Alabama">Alabama</option>
<option value="Alaska">Alaska</option>
<option value="Arizona">Arizona</option>
<option value="Arkansas">Arkansas</option>
<option value="California">California</option>
<option value="Colorado">Colorado</option>
<option value="Connecticut">Connecticut</option>
<option value="Delaware">Delaware</option>
<option value="District of Columbia">District of Columbia</option>
<option value="Florida">Florida</option>
<option value="Georgia">Georgia</option>
<option value="Hawaii">Hawaii</option>
<option value="Idaho">Idaho</option>
<option value="Illinois">Illinois</option>
<option value="Indiana">Indiana</option>
<option value="Iowa">Iowa</option>
<option value="Kansas">Kansas</option>
<option value="Kentucky">Kentucky</option>
<option value="Louisiana">Louisiana</option>
<option value="Maine">Maine</option>
<option value="Maryland">Maryland</option>
<option value="Massachusetts">Massachusetts</option>
<option value="Michigan">Michigan</option>
<option value="Minnesota">Minnesota</option>
<option value="Mississippi">Mississippi</option>
<option value="Missouri">Missouri</option>
<option value="Montana">Montana</option>
<option value="Nebraska">Nebraska</option>
<option value="Nevada">Nevada</option>
<option value="New Hampshire">New Hampshire</option>
<option value="New Jersey">New Jersey</option>
<option value="New Mexico">New Mexico</option>
<option value="New York">New York</option>
<option value="North Carolina">North Carolina</option>
<option value="North Dakota">North Dakota</option>
<option value="Ohio">Ohio</option>
<option value="Oklahoma">Oklahoma</option>
<option value="Oregon">Oregon</option>
<option value="Pennsylvania">Pennsylvania</option>
<option value="Puerto Rico">Puerto Rico</option>
<option value="Rhode Island">Rhode Island</option>
<option value="South Carolina">South Carolina</option>
<option value="South Dakota">South Dakota</option>
<option value="Tennessee">Tennessee</option>
<option value="Texas">Texas</option>
<option value="Utah">Utah</option>
<option value="Vermont">Vermont</option>
<option value="Virginia">Virginia</option>
<option value="Washington">Washington</option>
<option value="West Virginia">West Virginia</option>
<option value="Wisconsin">Wisconsin</option>
<option value="Wyoming">Wyoming</option>

</select>

<textarea
id="userInput"
placeholder="Ask about grants, funding, nonprofits..."
rows="1"
></textarea>

<button
class="send-btn"
onclick="sendMessage()"
>
↑
</button>

</div>

</div>

</div>

</div>

<script>

const chat =
document.getElementById("chat");

const userInput =
document.getElementById("userInput");

let savedGrants =
JSON.parse(
localStorage.getItem("savedGrants")
) || [];

let conversations =
JSON.parse(
localStorage.getItem("conversations")
) || [];

/* START NEW */

function startNewConversation(){

const currentText =
chat.innerText.trim();

if(
currentText &&
!currentText.includes(
"Tell me about your business"
)
){
saveConversation();
}

chat.innerHTML = `

<div class="message bot hero-message">

Hi! I'm Grant Simone.

<br><br>

Tell me about your business,
nonprofit,
startup,
or funding goals
and I'll help you find
the best grants available.

</div>

`;

userInput.value = "";
userInput.style.height = "52px";

chat.scrollTop = 0;

}

/* ENTER SEND */

userInput.addEventListener(
"keydown",
function(e){

if(
e.key === "Enter" &&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

/* AUTO RESIZE */

userInput.addEventListener(
"input",
function(){

this.style.height = "52px";

if(this.scrollHeight > 52){

this.style.height =
this.scrollHeight + "px";

}

}
);

/* SEND */

async function sendMessage(){

const selectedState =
document.getElementById(
"stateSelect"
).value;

const text =
userInput.value.trim();

if(!text) return;

chat.innerHTML += `

<div class="message user">
${text}
</div>

`;

const loadingId = Date.now();

chat.innerHTML += `

<div class="message bot" id="loading-${loadingId}">
Searching live grant databases...
</div>

`;

userInput.value = "";
userInput.style.height = "52px";

chat.scrollTo({
top:chat.scrollHeight,
behavior:"smooth"
});

try{

const response = await fetch(
"https://grant-simone-backend-production.up.railway.app/grant-search",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

businessType:text,
keywords:text,
state:selectedState,
startup:"yes"

})

}
);

const data =
await response.json();

document
.getElementById(`loading-${loadingId}`)
?.remove();

if(
data.grants &&
data.grants.length > 0
){

showGrantCards(data.grants);

}else{

chat.innerHTML += `

<div class="message bot">
No grants found.
</div>

`;

saveConversation();

}

}catch(error){

console.error(error);

document
.getElementById(`loading-${loadingId}`)
?.remove();

chat.innerHTML += `

<div class="message bot">
❌ Unable to fetch grants.
</div>

`;

}

}

/* SHOW GRANTS */

function showGrantCards(grants){

grants = grants.slice(0,10);

const cardsHTML =
grants.map(grant => {

const encodedGrant =
encodeURIComponent(
JSON.stringify(grant)
);

return `

<div class="grant-card">

<div class="badge">
AI Match ${Math.min(grant.matchScore || 85,100)}%
</div>

<div class="grant-title">
${grant.grantName}
</div>

<div class="grant-desc">
${grant.description}
</div>

<div class="actions">

<button
class="btn primary"
onclick="
window.open(
'${grant.applicationUrl}',
'_blank'
)
"
>
Apply
</button>

<button
class="btn secondary"
onclick='saveGrantFromEncoded("${encodedGrant}")'
>
Save
</button>

<button
class="btn secondary"
onclick='generatePDFfromEncoded("${encodedGrant}")'
>
Generate Proposal
</button>

</div>

</div>

`;

}).join("");

chat.innerHTML += `

<div class="message bot">

<div class="grants-grid">

${cardsHTML}

</div>

</div>

`;

chat.scrollTo({
top:chat.scrollHeight,
behavior:"smooth"
});

saveConversation();

}

/* SAVE GRANT */

function saveGrant(grant){

const exists =
savedGrants.find(
g =>
g.applicationUrl ===
grant.applicationUrl
);

if(exists){
return;
}

savedGrants.unshift(grant);

localStorage.setItem(
"savedGrants",
JSON.stringify(savedGrants)
);

renderSavedGrants();

}

function saveGrantFromEncoded(encoded){

const grant =
JSON.parse(
decodeURIComponent(encoded)
);

saveGrant(grant);

}

/* PDF */

function generatePDFfromEncoded(encoded){

const grant =
JSON.parse(
decodeURIComponent(encoded)
);

generatePDF(grant);

}

async function generatePDF(grant){

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

doc.setFontSize(22);

doc.text(
"Grant Simone AI Funding Proposal",
20,
20
);

doc.setFontSize(16);

doc.text(
`Grant Name: ${grant.grantName || "N/A"}`,
20,
40
);

doc.text(
`AI Match: ${grant.matchScore || 85}%`,
20,
55
);

doc.text(
`Source: ${grant.source || "Grant Database"}`,
20,
70
);

doc.setFontSize(13);

const description =
doc.splitTextToSize(
grant.description || "No description available.",
170
);

doc.text(
description,
20,
90
);

doc.setFontSize(12);

doc.text(
`Application URL: ${grant.applicationUrl || "N/A"}`,
20,
250
);

doc.save("grant-simone-proposal.pdf");

}

/* SAVE CONVERSATION */

function saveConversation(){

const messages =
chat.innerHTML.trim();

const cleanText =
chat.innerText.trim();

if(
cleanText === "" ||
cleanText.includes(
"Tell me about your business"
)
){
return;
}

const exists =
conversations.find(
c => c.messages === messages
);

if(exists){
return;
}

const title =
"Conversation " +
(conversations.length + 1);

conversations.unshift({

title,
messages,
timestamp:Date.now()

});

localStorage.setItem(
"conversations",
JSON.stringify(conversations)
);

renderSavedGrants();

}

/* OPEN CONVERSATION */

function openConversation(index){

const conversation =
conversations[index];

if(
!conversation ||
!conversation.messages
){
return;
}

chat.innerHTML =
conversation.messages;

setTimeout(()=>{

chat.scrollTop =
chat.scrollHeight;

},100);

}

/* SIDEBAR */

function renderSavedGrants(){

const container =
document.getElementById(
"savedContainer"
);

let html = "";

/* CONVERSATIONS */

conversations.forEach(
(conv,index)=>{

html += `

<div
class="saved-card"
onclick="
openConversation(${index})
"
>

<h3>
💬 ${conv.title}
</h3>

<p>
Saved Conversation
</p>

</div>

`;

}
);

/* SAVED GRANTS */

savedGrants.forEach(
(grant)=>{

html += `

<div
class="saved-card"
onclick="
window.open(
'${grant.applicationUrl}',
'_blank'
)
"
>

<h3>
⭐ ${grant.grantName}
</h3>

<p>
Saved Grant
</p>

</div>

`;

}
);

container.innerHTML = html;

}

/* INIT */

renderSavedGrants();

/* AUTO SAVE */

window.addEventListener(
"beforeunload",
()=>{

const currentText =
chat.innerText.trim();

if(
currentText &&
!currentText.includes(
"Tell me about your business"
)
){
saveConversation();
}

}
);

</script>

</body>
</html>
