<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Grant Simone</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#000;
color:white;
overflow:hidden;

background-image:

linear-gradient(
rgba(0,0,0,0.82),
rgba(0,0,0,0.88)
),

url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

.app{
display:flex;
height:100vh;
}

.sidebar{

width:320px;
background:#050505;

border-right:
1px solid rgba(255,255,255,0.05);

padding:24px;

overflow-y:auto;
}

.logo{

display:flex;
align-items:center;
gap:14px;

margin-bottom:28px;
}

.logo img{

width:62px;
height:62px;

border-radius:50%;
object-fit:cover;
}

.logo h1{

font-size:18px;
line-height:1.1;
font-weight:800;
}

.logo p{

color:#999;
margin-top:6px;
}

.new-chat{

width:100%;

padding:14px 18px;

border:none;

border-radius:16px;

background:#FFD54F;

font-size:16px;
font-weight:700;

cursor:pointer;

margin-bottom:24px;

transition:0.25s;
}

.new-chat:hover{

transform:translateY(-2px);

opacity:0.95;
}

.sidebar-title{

font-size:12px;

letter-spacing:2px;

color:#666;

margin-bottom:16px;
}

.saved-card{

background:#0d0d0d;

border:
1px solid rgba(255,213,79,0.12);

border-radius:20px;

padding:18px;

margin-bottom:16px;

cursor:pointer;

transition:0.25s;
}

.saved-card:hover{

border-color:#FFD54F;

transform:translateY(-3px);
}

.saved-card h3{

font-size:18px;

margin-bottom:8px;
}

.saved-card p{

color:#777;

font-size:14px;
}

.main{

height:100dvh;

display:flex;

flex-direction:column;

width:100%;

overflow:hidden;
}

.topbar{

padding:16px 24px;

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:
1px solid rgba(255,255,255,0.05);
}

.top-left{

display:flex;
align-items:center;
gap:14px;
}

.top-left img{

width:48px;
height:48px;

border-radius:50%;
object-fit:cover;
}

.top-left h1{

font-size:18px;

line-height:1.1;

font-weight:700;
}

.top-left p{

color:#999;

margin-top:4px;

font-size:13px;
}

.online{

padding:8px 16px;

border-radius:999px;

border:
1px solid rgba(255,213,79,0.2);

background:
rgba(255,213,79,0.08);

color:#FFD54F;

font-size:14px;

font-weight:600;
}

.chat{

flex:1;

overflow-y:auto;

scrollbar-gutter:stable;

padding:16px 20px 180px 16px;

min-height:0;
}

.message{

max-width:920px;

padding:28px;

border-radius:30px;

margin-bottom:24px;

line-height:1.9;

font-size:18px;
}

.bot{

background:
rgba(10,10,10,0.55);

backdrop-filter:blur(12px);

border:
1px solid rgba(255,255,255,0.05);

position:relative;

z-index:1;

overflow:hidden;
}

.user{

background:#FFD54F;

color:black;

margin-left:auto;

font-weight:bold;
}

.grants-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:24px;

margin-top:24px;

align-items:stretch;
}

.grant-card{

background:
rgba(10,10,10,0.55);

backdrop-filter:blur(14px);

border:
1px solid rgba(255,213,79,0.12);

border-radius:30px;

padding:28px;

transition:0.25s;

position:relative;

z-index:2;

height:100%;
}

.grant-card:hover{

transform:translateY(-4px);

border-color:#FFD54F;
}

.badge{

display:inline-block;

padding:10px 18px;

border-radius:999px;

background:
rgba(255,213,79,0.08);

border:
1px solid rgba(255,213,79,0.14);

color:#FFD54F;

margin-bottom:22px;
}

.grant-title{

font-size:22px;

font-weight:bold;

margin-bottom:18px;
}

.grant-desc{

color:#bbb;

line-height:1.8;

margin-bottom:28px;
}

.actions{

display:flex;

gap:12px;

flex-wrap:wrap;

position:relative;

z-index:5;
}

.btn{

padding:14px 20px;

border:none;

border-radius:16px;

cursor:pointer;

font-size:16px;
font-weight:bold;
}

.primary{

background:#FFD54F;

color:black;
}

.secondary{

background:#1b1b1b;

color:white;
}

.input-area{

position:fixed;

bottom:12px;

left:0;
right:0;

width:100%;

padding:0 16px;

background:transparent;

z-index:9999;
}

.input-wrap{

display:flex;

align-items:center;

gap:10px;

max-width:1000px;

margin:0 auto;

padding:10px 12px;

border-radius:999px;

background:
rgba(10,10,10,0.82);

backdrop-filter:blur(16px);

border:
1px solid rgba(255,255,255,0.06);

box-shadow:
0 0 25px rgba(0,0,0,0.4);
}

.input-wrap input{

flex:1;

background:none;

border:none;

outline:none;

color:white;

font-size:16px;

padding:14px 10px;
}

.send-btn{

min-width:56px;

width:56px;

height:56px;

aspect-ratio:1/1;

flex-shrink:0;

display:flex;

align-items:center;

justify-content:center;

border:none;

border-radius:50%;

background:#FFD54F;

font-size:24px;

font-weight:bold;

cursor:pointer;
}

.custom-modal-overlay{

position:fixed;

inset:0;

background:
rgba(0,0,0,0.84);

display:flex;

justify-content:center;

align-items:center;

padding:20px;

z-index:999999;
}

.custom-modal{

width:100%;

max-width:650px;

background:
rgba(15,15,15,0.7);

backdrop-filter:blur(18px);

border-radius:30px;

border:
1px solid rgba(255,213,79,0.14);

padding:40px;

position:relative;
}

.close-modal{

position:absolute;

top:20px;
right:20px;

width:42px;
height:42px;

border:none;

border-radius:50%;

background:#222;

color:white;

cursor:pointer;
}

.modal-title{

font-size:42px;

margin-bottom:18px;
}

.modal-desc{

color:#bbb;

line-height:1.9;

margin-bottom:28px;
}

.modal-actions{

display:flex;

gap:14px;

flex-wrap:wrap;
}

@media(max-width:900px){

.app{
flex-direction:column;
}

.sidebar{
display:none;
}

.topbar{

padding:
max(22px, env(safe-area-inset-top))
18px
14px;
}

.top-left{
gap:10px;
}

.top-left img{
width:52px;
height:52px;
}

.top-left h1{
font-size:22px;
line-height:1;
}

.top-left p{
font-size:12px;
}

.message{

font-size:15px;

padding:16px;

border-radius:22px;

line-height:1.7;
}

.bot{

max-width:92%;

margin-right:auto;
}

.user{

max-width:88%;

margin-left:auto;
}

.grants-grid{

grid-template-columns:1fr;

gap:18px;
}

.grant-card{

padding:20px;

border-radius:24px;
}

.grant-title{
font-size:22px;
}

.grant-desc{
font-size:14px;
}

.actions{
gap:10px;
}

.btn{

padding:12px 16px;

font-size:14px;
}

.input-area{

padding:10px 16px 12px;
}

.input-wrap{

padding:8px;
}

.input-wrap input{

font-size:14px;

padding:10px 12px;
}

.send-btn{

box-shadow:
0 0 25px rgba(255,213,79,0.25);

width:56px;
height:56px;

font-size:24px;
}

.custom-modal{
padding:26px;
}

.modal-title{
font-size:28px;
}

.modal-desc{
font-size:15px;
}

}

@media(min-width:901px){

.input-area{

left:50%;

transform:translateX(-50%);

bottom:20px;

width:calc(100% - 420px);

max-width:980px;
}
}

</style>
</head>

<body>
</body>
</html>
