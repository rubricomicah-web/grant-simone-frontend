<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>Grant Simone AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    min-height:100dvh;

    background:#000 !important;

    overflow:hidden;

    font-family:
    Inter,
    sans-serif;

    color:white;
}

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    linear-gradient(
        rgba(0,0,0,0.88),
        rgba(0,0,0,0.95)
    ),
    url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

    background-size:cover;
    background-position:center;

    z-index:-2;
}

.app{
    min-height:100dvh;
}

.main{
    min-height:100dvh;
}

@supports (-webkit-touch-callout: none){

    body,
    .app,
    .main{

        min-height:-webkit-fill-available;
    }
}

/* iPhone white bottom fix */

html{
    background:#000 !important;
}

body{
    position:fixed;
    inset:0;
}

/* MOBILE */

@media(max-width:768px){

    body{
        overflow:hidden;
    }

    .app{
        height:100dvh;
        overflow:hidden;
    }

    .main{
        height:100dvh;
        overflow-y:auto;
        -webkit-overflow-scrolling:touch;
        padding-bottom:120px;
    }

    .chat-input{
        position:fixed;
        bottom:20px;
        left:16px;
        right:16px;
        z-index:999;
    }

}

</style>
</head>

<body>

<div class="app">

    <!-- YOUR APP -->

</div>

</body>
</html>
