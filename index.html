<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Grant Simone AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:
linear-gradient(
rgba(0,0,0,.86),
rgba(0,0,0,.92)
),
url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

background-size:cover;
background-position:center;
background-attachment:fixed;

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

padding:18px;

color:white;
}

#app{

width:100%;
max-width:1400px;
height:95vh;

display:flex;
overflow:hidden;

border-radius:32px;

background:
rgba(12,12,12,.55);

backdrop-filter:blur(26px);

border:
1px solid rgba(255,255,255,.06);

box-shadow:
0 25px 90px rgba(0,0,0,.6);
}

/* SIDEBAR */

#sidebar{

width:290px;

background:
rgba(255,255,255,.03);

border-right:
1px solid rgba(255,255,255,.05);

padding:28px 22px;

display:flex;
flex-direction:column;
}

.sidebar-logo{

display:flex;
align-items:center;
gap:14px;

margin-bottom:34px;
}

.sidebar-logo img{

width:54px;
height:54px;

border-radius:50%;

border:
2px solid rgba(212,175,55,.45);
}

.sidebar-logo h1{

font-size:22px;
font-weight:700;
}

.sidebar-logo p{

font-size:13px;
color:rgba(255,255,255,.55);
margin-top:4px;
}

.sidebar-box{

background:
rgba(255,255,255,.03);

border:
1px solid rgba(255,255,255,.05);

border-radius:22px;

padding:20px;

margin-bottom:18px;
}

.sidebar-box h3{

font-size:14px;
font-weight:700;

margin-bottom:12px;

color:#f5d76e;
}

.sidebar-box p{

font-size:13px;

line-height:1.7;

color:
rgba(255,255,255,.72);
}

.quick-btn{

width:100%;

padding:14px;

border:none;

border-radius:16px;

margin-top:10px;

background:
rgba(255,255,255,.05);

color:white;

font-size:14px;
font-weight:600;

cursor:pointer;

transition:.25s;
}

.quick-btn:hover{

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;
}

/* MAIN */

#main{

flex:1;

display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */

#header{

padding:22px 28px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:
1px solid rgba(255,255,255,.05);
}

.header-left{

display:flex;
align-items:center;
gap:14px;
}

.header-left img{

width:50px;
height:50px;

border-radius:50%;
}

.header-left h2{

font-size:21px;
font-weight:700;
}

.header-left p{

font-size:13px;
color:rgba(255,255,255,.55);
}

.status{

padding:10px 16px;

border-radius:999px;

background:
rgba(212,175,55,.08);

border:
1px solid rgba(212,175,55,.14);

font-size:13px;

color:#f5d76e;
}

/* CHAT */

#chat-container{

flex:1;

overflow-y:auto;

padding:26px;

scroll-behavior:smooth;
}

.message{

display:flex;
margin-bottom:24px;
}

.message.user{
justify-content:flex-end;
}

.message.ai{
justify-content:flex-start;
}

.bubble{

max-width:78%;

padding:18px 22px;

border-radius:24px;

font-size:15px;
line-height:1.8;
}

.user .bubble{

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-weight:600;

border-bottom-right-radius:10px;
}

.ai .bubble{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.06);

border-bottom-left-radius:10px;

color:
rgba(255,255,255,.95);
}

/* TYPING */

.typing{

display:flex;
gap:6px;

margin-top:12px;
}

.typing span{

width:8px;
height:8px;

border-radius:50%;

background:#f5d76e;

animation:bounce 1.4s infinite;
}

.typing span:nth-child(2){
animation-delay:.2s;
}

.typing span:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{

0%,80%,100%{
transform:scale(0);
opacity:.3;
}

40%{
transform:scale(1);
opacity:1;
}

}

/* GRANT GRID */

.grant-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:18px;

margin-top:10px;
}

.grant-card{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.06);

border-radius:24px;

padding:22px;

transition:.3s;

position:relative;

overflow:hidden;
}

.grant-card:hover{

transform:translateY(-3px);

border:
1px solid rgba(212,175,55,.25);

box-shadow:
0 15px 40px rgba(212,175,55,.08);
}

.grant-title{

font-size:17px;
font-weight:700;

line-height:1.5;

margin-bottom:18px;

color:#f5d76e;
}

.grant-label{

font-size:11px;

text-transform:uppercase;

letter-spacing:.08em;

color:
rgba(255,255,255,.42);

margin-bottom:4px;
}

.grant-value{

font-size:14px;

line-height:1.7;

margin-bottom:16px;

color:
rgba(255,255,255,.9);
}

.grant-link{

display:inline-flex;
align-items:center;
justify-content:center;

padding:12px 18px;

border-radius:14px;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:14px;
font-weight:700;

text-decoration:none;

transition:.25s;
}

.grant-link:hover{
transform:scale(1.04);
}

.badge{

display:inline-block;

margin-top:16px;

padding:8px 14px;

border-radius:999px;

font-size:11px;
font-weight:800;

letter-spacing:.06em;

text-transform:uppercase;

color:white;
}

/* PROPOSAL */

.proposal-card{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(212,175,55,.16);

border-radius:24px;

padding:28px;

line-height:1.9;
}

.proposal-title{

font-size:22px;
font-weight:700;

margin-bottom:20px;

color:#f5d76e;
}

/* INPUT */

#input-area{

padding:22px;

border-top:
1px solid rgba(255,255,255,.05);
}

#input-wrapper{

display:flex;
align-items:flex-end;
gap:14px;

padding:16px;

border-radius:24px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.06);
}

textarea{

flex:1;

background:transparent;
border:none;
outline:none;
resize:none;

font-family:'Inter',sans-serif;

font-size:15px;
line-height:1.7;

color:white;

max-height:180px;
min-height:26px;
}

textarea::placeholder{
color:rgba(255,255,255,.35);
}

button{

width:58px;
height:58px;

border:none;

border-radius:50%;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:22px;
font-weight:700;

cursor:pointer;

transition:.25s;
}

button:hover{
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:980px){

#app{
flex-direction:column;
height:100vh;
border-radius:0;
}

#sidebar{
display:none;
}

.bubble{
max-width:92%;
}

.grant-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div id="app">

<!-- SIDEBAR -->

<div id="sidebar">

<div class="sidebar-logo">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>
<h1>Grant Simone</h1>
<p>AI Grant Funding Consultant</p>
</div>

</div>

<div class="sidebar-box">

<h3>What I Can Do</h3>

<p>

• Find grants by state<br><br>

• Match funding opportunities<br><br>

• Help nonprofits & businesses<br><br>

• Generate grant proposals<br><br>

• Federal, private & local grants

</p>

</div>

<div class="sidebar-box">

<h3>Quick Prompts</h3>

<button class="quick-btn"
onclick="quickPrompt('Find grants for my nonprofit in California')">
California Nonprofit Grants
</button>

<button class="quick-btn"
onclick="quickPrompt('Find grants for women owned business in Texas')">
Women-Owned Business
</button>

<button class="quick-btn"
onclick="quickPrompt('Generate a grant proposal for my NGO')">
Generate Proposal
</button>

</div>

</div>

<!-- MAIN -->

<div id="main">

<!-- HEADER -->

<div id="header">

<div class="header-left">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>
<h2>Grant Simone</h2>
<p>Funding Expert Assistant</p>
</div>

</div>

<div class="status">
● Online
</div>

</div>

<!-- CHAT -->

<div id="chat-container"></div>

<!-- INPUT -->

<div id="input-area">

<div id="input-wrapper">

<textarea
id="messageInput"
rows="1"
placeholder="Ask about grants, funding opportunities, or proposal generation..."
></textarea>

<button id="sendBtn">
↑
</button>

</div>

</div>

</div>

</div>

<script>

/* API */

const GRANT_SEARCH_API =
"https://grant-agent-backend-production.up.railway.app/grant-search";

const PROPOSAL_API =
"https://grant-agent-backend-production.up.railway.app/generate-proposal";

/* ELEMENTS */

const chatContainer =
document.getElementById("chat-container");

const input =
document.getElementById("messageInput");

const sendBtn =
document.getElementById("sendBtn");

/* WELCOME */

window.onload = ()=>{

addMessage(

`Hello! 👋

I'm Grant Simone.

Tell me:

• your business type
• your state
• what funding you need

and I'll find the best grants for you.`,

"ai"

);

};

/* QUICK PROMPT */

function quickPrompt(text){

input.value = text;

sendMessage();

}

/* AUTO HEIGHT */

input.addEventListener("input",()=>{

input.style.height="auto";

input.style.height =
input.scrollHeight + "px";

});

/* ADD MESSAGE */

function addMessage(content,type,isHTML=false){

const wrapper =
document.createElement("div");

wrapper.className =
`message ${type}`;

const bubble =
document.createElement("div");

bubble.className =
"bubble";

if(isHTML){
bubble.innerHTML = content;
}else{
bubble.innerText = content;
}

wrapper.appendChild(bubble);

chatContainer.appendChild(wrapper);

chatContainer.scrollTop =
chatContainer.scrollHeight;

}

/* TYPING */

function showTyping(){

const wrapper =
document.createElement("div");

wrapper.className =
"message ai";

wrapper.id = "typing";

wrapper.innerHTML = `

<div class="bubble">

<div style="
font-weight:700;
color:#f5d76e;
margin-bottom:10px;
">
Grant Simone
</div>

<div id="typingText">
Searching grants in your state...
</div>

<div class="typing">
<span></span>
<span></span>
<span></span>
</div>

</div>

`;

chatContainer.appendChild(wrapper);

chatContainer.scrollTop =
chatContainer.scrollHeight;

const texts = [

"Searching grants in your state...",
"Checking federal opportunities...",
"Filtering business eligibility...",
"Finding verified funding sources...",
"Preparing your recommendations..."

];

let i = 0;

const interval =
setInterval(()=>{

const el =
document.getElementById("typingText");

if(!el){

clearInterval(interval);
return;

}

i = (i + 1) % texts.length;

el.innerText = texts[i];

},2200);

}

/* REMOVE TYPING */

function removeTyping(){

const typing =
document.getElementById("typing");

if(typing){
typing.remove();
}

}

/* PROPOSAL DETECTOR */

function isProposal(text){

const lower =
text.toLowerCase();

return (
lower.includes("proposal")
);

}

/* FETCH */

async function fetchWithTimeout(
url,
options={},
timeout=120000
){

const controller =
new AbortController();

const timeoutId =
setTimeout(
()=> controller.abort(),
timeout
);

const response =
await fetch(
url,
{
...options,
signal:controller.signal
}
);

clearTimeout(timeoutId);

return response;

}

/* BADGE COLOR */

function badgeColor(text){

const lower =
(text || "").toLowerCase();

if(lower.includes("strong"))
return "#22c55e";

if(lower.includes("medium"))
return "#f59e0b";

return "#ef4444";

}

/* RENDER GRANTS */

function renderGrants(grants){

let html =
`<div class="grant-grid">`;

grants.forEach(grant=>{

html += `

<div class="grant-card">

<div class="grant-title">
${grant.grantName || "Grant Opportunity"}
</div>

<div class="grant-label">
Funding Amount
</div>

<div class="grant-value">
${grant.amount || "Varies"}
</div>

<div class="grant-label">
Purpose
</div>

<div class="grant-value">
${grant.purpose || "Business Support"}
</div>

<div class="grant-label">
Eligibility
</div>

<div class="grant-value">
${grant.eligibility || "Check Requirements"}
</div>

<a
class="grant-link"
href="${grant.applicationUrl || "#"}"
target="_blank"
>

Apply for Grant →

</a>

<br>

<div
class="badge"
style="
background:${badgeColor(grant.recommendation)}
"
>

${grant.recommendation || "Strong Match"}

</div>

</div>

`;

});

html += `</div>`;

return html;

}

/* SEND */

async function sendMessage(){

const message =
input.value.trim();

if(!message) return;

addMessage(message,"user");

input.value="";
input.style.height="auto";

showTyping();

try{

let endpoint =
GRANT_SEARCH_API;

let payload = {

businessType:
"Business, nonprofit, NGO, startup",

state:
"United States",

keywords:
message

};

if(isProposal(message)){

endpoint =
PROPOSAL_API;

payload = {

businessName:
"My Organization",

businessType:
"Business",

fundingPurpose:
"Growth Funding",

grantName:
message

};

}

const response =
await fetchWithTimeout(
endpoint,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(payload)
},
120000
);

if(!response.ok){

throw new Error(
`Backend Error ${response.status}`
);

}

const data =
await response.json();

removeTyping();

/* PROPOSAL */

if(endpoint === PROPOSAL_API){

const proposal =
data.proposalNarrative ||
data.proposal ||
data.content ||
data.message ||
JSON.stringify(data);

const html = `

<div class="proposal-card">

<div class="proposal-title">
Grant Proposal
</div>

<div>
${proposal.replace(/\n/g,"<br>")}
</div>

</div>

`;

addMessage(html,"ai",true);

return;

}

/* FILTER STATE */

const lowerMessage =
message.toLowerCase();

const states = [

"california",
"texas",
"florida",
"new york",
"michigan",
"wisconsin",
"missouri"

];

let detectedState = "";

states.forEach(state=>{

if(lowerMessage.includes(state)){

detectedState = state;

}

});

let grants =
data.grants || [];

if(detectedState){

grants =
grants.filter(grant=>{

const text =
JSON.stringify(grant)
.toLowerCase();

return text.includes(detectedState);

});

}

if(grants.length === 0){

addMessage(

`I couldn't find exact grants for that state yet.

Try adding:
• business type
• nonprofit or for-profit
• city/state
• funding purpose`,

"ai"

);

return;

}

/* CONVERSATIONAL RESPONSE */

addMessage(

`I found ${grants.length} funding opportunities that may match your request.

Here are the best recommendations 👇`,

"ai"

);

const cards =
renderGrants(grants);

addMessage(cards,"ai",true);

}catch(error){

console.error(error);

removeTyping();

addMessage(

`Something went wrong while connecting to the funding database.

Please try again in a few seconds.`,

"ai"

);

}

}

/* BUTTON */

sendBtn.addEventListener(
"click",
sendMessage
);

/* ENTER */

input.addEventListener(
"keydown",
(e)=>{

if(
e.key==="Enter"
&&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

</script>

</body>

</html>
