<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Grant Simone</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:#000;
color:white;
overflow:hidden;
height:100vh;

background:

linear-gradient(
rgba(0,0,0,0.82),
rgba(0,0,0,0.88)
),

url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

}

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{

width:280px;

background:
rgba(5,5,5,0.82);

backdrop-filter:blur(14px);

border-right:
1px solid rgba(255,255,255,0.05);

padding:20px;

overflow-y:auto;

}

.logo{

display:flex;
align-items:center;
gap:12px;

margin-bottom:30px;

position:relative;
z-index:999;

}

.logo img{

width:52px;
height:52px;

border-radius:50%;

object-fit:cover;

display:block;

}

.logo h2{
font-size:20px;
}

.logo p{

font-size:13px;

color:#aaa;

line-height:1.4;

}

.new-chat-btn{

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:#FFD54F;

font-size:17px;

font-weight:bold;

cursor:pointer;

margin-bottom:28px;

}

.sidebar-title{

font-size:12px;

color:#777;

margin-bottom:18px;

letter-spacing:1px;

}

.saved-card{

background:#0d0d0d;

border:
1px solid rgba(255,213,79,0.08);

padding:18px;

border-radius:22px;

margin-bottom:16px;

cursor:pointer;

transition:0.2s;

}

.saved-card:hover{
border-color:#FFD54F;
}

.saved-card h3{

font-size:16px;

margin-bottom:8px;

line-height:1.4;

}

.saved-card p{

font-size:13px;

color:#aaa;

}

/* MAIN */

.main{

flex:1;

display:flex;

flex-direction:column;

height:100vh;

overflow:hidden;

}

/* TOPBAR */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:18px 28px;

border-bottom:
1px solid rgba(255,255,255,0.05);

position:relative;

z-index:999;

background:
rgba(5,5,5,0.45);

backdrop-filter:blur(12px);

}

.top-left{

display:flex;
align-items:center;
gap:12px;

}

.top-left img{

width:52px;
height:52px;

border-radius:50%;

object-fit:cover;

display:block;

}

.top-left h2{
font-size:22px;
}

.top-left p{

font-size:13px;

color:#aaa;

}

.online{

background:
rgba(255,213,79,0.08);

padding:10px 18px;

border-radius:999px;

color:#FFD54F;

font-size:14px;

position:relative;

z-index:999;

}

/* CHAT */

.chat{

flex:1;

overflow-y:auto;

scrollbar-gutter:stable;

scroll-behavior:smooth;

padding:40px 20px 180px 20px;

min-height:0;

display:flex;

flex-direction:column;

align-items:center;

position:relative;

z-index:1;

}

.hero-message{

width:100%;

max-width:1000px;

margin:0 auto;

}

.message{

max-width:1000px;

width:100%;

padding:26px;

border-radius:28px;

margin-bottom:24px;

line-height:1.9;

font-size:18px;

word-wrap:break-word;

}

.bot{

background:
rgba(8,8,8,0.65);

border:
1px solid rgba(255,255,255,0.05);

backdrop-filter:blur(12px);

}

.user{

background:#FFD54F;

color:black;

margin-left:auto;

font-weight:bold;

}

/* INPUT */

.input-area{

position:fixed;

left:280px;
right:0;

bottom:max(12px, env(safe-area-inset-bottom));

padding:0 20px;

padding-bottom:env(safe-area-inset-bottom);

z-index:9999;

}

.input-wrap{

max-width:1000px;

margin:0 auto;

display:flex;

align-items:center;

gap:12px;

padding:14px;

border-radius:999px;

background:
rgba(8,8,8,0.82);

border:
1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

}

.input-wrap textarea{

flex:1;

background:none;

border:none;

outline:none;

color:white;

font-size:16px;

resize:none;

padding:12px;

min-height:52px;

max-height:140px;

overflow-y:auto;

}

.state-select{

background:#111;

color:white;

border:none;

padding:14px;

border-radius:14px;

outline:none;

}

.send-btn{

width:60px;
height:60px;

border:none;

border-radius:50%;

background:#FFD54F;

font-size:24px;

cursor:pointer;

font-weight:bold;

}

/* GRANTS */

.grants-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:24px;

margin-top:20px;

width:100%;

max-width:1000px;

}

.grant-card{

background:
rgba(8,8,8,0.72);

border:
1px solid rgba(255,213,79,0.12);

padding:28px;

border-radius:28px;

backdrop-filter:blur(12px);

}

.badge{

display:inline-block;

padding:10px 18px;

border-radius:999px;

background:
rgba(255,213,79,0.08);

color:#FFD54F;

margin-bottom:20px;

font-size:14px;

}

.grant-title{

font-size:24px;

font-weight:bold;

margin-bottom:16px;

line-height:1.4;

}

.grant-desc{

font-size:15px;

line-height:1.8;

color:#ccc;

margin-bottom:24px;

}

.actions{

display:flex;

gap:12px;

flex-wrap:wrap;

}

.btn{

padding:14px 22px;

border:none;

border-radius:16px;

font-size:15px;

font-weight:bold;

cursor:pointer;

}

.primary{

background:#FFD54F;

color:black;

}

.secondary{

background:#1b1b1b;

color:white;

}

/* MOBILE */

@media(max-width:900px){

.sidebar{
display:none;
}

.input-area{
left:0;
}

.message{

font-size:16px;

padding:22px;

}

.input-wrap textarea{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>

<h2>Grant Simone</h2>

<p>
AI Grant Funding Consultant
</p>

</div>

</div>

<button
class="new-chat-btn"
onclick="startNewConversation()"
>
+ New Conversation
</button>

<div class="sidebar-title">
RECENT CONVERSATIONS
</div>

<div id="savedContainer"></div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<div class="top-left">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>

<h2>Grant Simone</h2>

<p>
AI Grant Funding Consultant
</p>

</div>

</div>

<div class="online">
● Online
</div>

</div>

<!-- CHAT -->

<div
class="chat"
id="chat"
>

<div class="message bot hero-message">

Hi! I'm Grant Simone.

<br><br>

Tell me about your business,
nonprofit,
startup,
or funding goals
and I'll help you find
the best grants available.

</div>

</div>

<!-- INPUT -->

<div class="input-area">

<div class="input-wrap">

<select
id="stateSelect"
class="state-select"
>

<option value="USA">
All USA
</option>

<option value="California">
California
</option>

<option value="Texas">
Texas
</option>

<option value="Florida">
Florida
</option>

<option value="New York">
New York
</option>

</select>

<textarea
id="userInput"
placeholder="Ask about grants..."
rows="1"
></textarea>

<button
class="send-btn"
onclick="sendMessage()"
>
↑
</button>

</div>

</div>

</div>

</div>

<script>

const chat =
document.getElementById("chat");

const userInput =
document.getElementById("userInput");

let savedGrants =
JSON.parse(
localStorage.getItem("savedGrants")
) || [];

let conversations =
JSON.parse(
localStorage.getItem("conversations")
) || [];

/* SAVE CONVERSATION */

function saveConversation(){

const messages =
chat.innerHTML;

const cleanText =
chat.innerText.trim();

if(
cleanText === "" ||
cleanText.includes(
"Tell me about your business"
)
){
return;
}

const exists =
conversations.find(
c => c.messages === messages
);

if(exists){
return;
}

const conversationData = {

id:Date.now(),

title:
`Conversation ${conversations.length + 1}`,

messages,

timestamp:Date.now()

};

conversations.unshift(
conversationData
);

localStorage.setItem(
"conversations",
JSON.stringify(conversations)
);

renderSidebar();

}

/* NEW CHAT */

function startNewConversation(){

const currentText =
chat.innerText.trim();

if(
currentText &&
!currentText.includes(
"Tell me about your business"
)
){
saveConversation();
}

chat.innerHTML = `

<div class="message bot hero-message">

Hi! I'm Grant Simone.

<br><br>

Tell me about your business,
nonprofit,
startup,
or funding goals
and I'll help you find
the best grants available.

</div>

`;

userInput.value = "";
userInput.style.height = "52px";

chat.scrollTop = 0;

}

/* SEND MESSAGE */

async function sendMessage(){

const text =
userInput.value.trim();

if(!text) return;

const state =
document.getElementById(
"stateSelect"
).value;

chat.innerHTML += `

<div class="message user">
${text}
</div>

`;

userInput.value = "";

chat.innerHTML += `

<div
class="message bot"
id="loadingMessage"
>
Searching live grant databases...
</div>

`;

chat.scrollTop =
chat.scrollHeight;

try{

const response =
await fetch(
"https://grant-simone-backend-production.up.railway.app/grant-search",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

businessType:text,
keywords:text,
state

})

}
);

const data =
await response.json();

document
.getElementById("loadingMessage")
?.remove();

if(
data.grants &&
data.grants.length > 0
){

showGrantCards(data.grants);

}else{

chat.innerHTML += `

<div class="message bot">
No grants found.
</div>

`;

}

}catch(error){

console.error(error);

document
.getElementById("loadingMessage")
?.remove();

chat.innerHTML += `

<div class="message bot">
❌ Unable to fetch grants.
</div>

`;

}

chat.scrollTop =
chat.scrollHeight;

}

/* SHOW GRANTS */

function showGrantCards(grants){

grants = grants.slice(0,10);

const cardsHTML =
grants.map(grant=>{

const encodedGrant =
encodeURIComponent(
JSON.stringify(grant)
);

return `

<div class="grant-card">

<div class="badge">
AI Match ${Math.min(grant.matchScore || 85,100)}%
</div>

<div class="grant-title">
${grant.grantName}
</div>

<div class="grant-desc">
${grant.description}
</div>

<div class="actions">

<button
class="btn primary"
onclick="
window.open(
'${grant.applicationUrl}',
'_blank'
)
"
>
Apply
</button>

<button
class="btn secondary"
onclick='saveGrantFromEncoded("${encodedGrant}")'
>
Save
</button>

</div>

</div>

`;

}).join("");

chat.innerHTML += `

<div class="message bot">

<div class="grants-grid">

${cardsHTML}

</div>

</div>

`;

chat.scrollTop =
chat.scrollHeight;

saveConversation();

}

/* SAVE GRANT */

function saveGrant(grant){

let saved =
JSON.parse(
localStorage.getItem("savedGrants")
) || [];

const exists =
saved.find(
g =>
g.applicationUrl ===
grant.applicationUrl
);

if(exists){
return;
}

saved.unshift(grant);

localStorage.setItem(
"savedGrants",
JSON.stringify(saved)
);

savedGrants = saved;

renderSidebar();

}

function saveGrantFromEncoded(encoded){

const grant =
JSON.parse(
decodeURIComponent(encoded)
);

saveGrant(grant);

}

/* SIDEBAR */

function renderSidebar(){

const container =
document.getElementById(
"savedContainer"
);

let html = "";

/* CONVERSATIONS */

conversations.forEach(
(conv,index)=>{

html += `

<div
class="saved-card"
onclick="
openConversation(${index})
"
>

<h3>
💬 ${conv.title}
</h3>

<p>
Saved Conversation
</p>

</div>

`;

}
);

/* SAVED GRANTS */

savedGrants.forEach(
(grant)=>{

html += `

<div
class="saved-card"
onclick="
window.open(
'${grant.applicationUrl}',
'_blank'
)
"
>

<h3>
⭐ ${grant.grantName}
</h3>

<p>
Saved Grant
</p>

</div>

`;

}
);

container.innerHTML = html;

}

/* OPEN CONVERSATION */

function openConversation(index){

const conversation =
conversations[index];

if(
!conversation ||
!conversation.messages
){
return;
}

chat.innerHTML =
conversation.messages;

setTimeout(()=>{

chat.scrollTop =
chat.scrollHeight;

},100);

}

/* ENTER SEND */

userInput.addEventListener(
"keydown",
function(e){

if(
e.key === "Enter" &&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

/* AUTO RESIZE */

userInput.addEventListener(
"input",
function(){

this.style.height = "52px";

if(this.scrollHeight > 52){

this.style.height =
this.scrollHeight + "px";

}

}
);

/* INITIALIZE */

renderSidebar();

/* BEFORE EXIT */

window.addEventListener(
"beforeunload",
()=>{

const currentText =
chat.innerText.trim();

if(
currentText &&
!currentText.includes(
"Tell me about your business"
)
){
saveConversation();
}

}
);

</script>

</body>
</html>
