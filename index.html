<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Grant Simone AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:
linear-gradient(
rgba(0,0,0,.92),
rgba(0,0,0,.96)
),
url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

background-size:cover;
background-position:center;

height:100vh;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

padding:18px;

color:white;
}

/* APP */

#app{

width:100%;
height:95vh;

display:flex;

overflow:hidden;

border-radius:34px;

background:
rgba(10,10,10,.58);

backdrop-filter:blur(30px);

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 30px 120px rgba(0,0,0,.7);
}

/* SIDEBAR */

#sidebar{

width:310px;

background:
rgba(255,255,255,.03);

border-right:
1px solid rgba(255,255,255,.05);

padding:24px;

overflow-y:auto;
}

.logo{

display:flex;
align-items:center;
gap:14px;

margin-bottom:26px;
}

.logo img{

width:58px;
height:58px;

border-radius:50%;
}

.logo h1{

font-size:22px;
font-weight:700;
}

.logo p{

font-size:13px;

color:
rgba(255,255,255,.5);
}

.new-chat{

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:15px;
font-weight:700;

cursor:pointer;

margin-bottom:24px;
}

.sidebar-title{

font-size:12px;

text-transform:uppercase;

letter-spacing:.08em;

color:
rgba(255,255,255,.4);

margin-bottom:14px;
}

.history-item{

padding:14px;

border-radius:16px;

background:
rgba(255,255,255,.04);

margin-bottom:12px;

cursor:pointer;

transition:.25s;
}

.history-item:hover{

background:
rgba(212,175,55,.08);
}

.saved-item{

display:block;

padding:14px;

border-radius:16px;

background:
rgba(255,255,255,.04);

margin-bottom:12px;

color:white;

text-decoration:none;

font-size:13px;
}

/* MAIN */

#main{

flex:1;

display:flex;
flex-direction:column;

overflow:hidden;
}

/* HEADER */

#header{

padding:24px 30px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:
1px solid rgba(255,255,255,.05);
}

.header-left{

display:flex;
align-items:center;
gap:14px;
}

.header-left img{

width:56px;
height:56px;

border-radius:50%;
}

.header-left h2{

font-size:24px;
font-weight:700;
}

.header-left p{

font-size:13px;

color:
rgba(255,255,255,.5);
}

.status{

padding:10px 16px;

border-radius:999px;

background:
rgba(212,175,55,.08);

border:
1px solid rgba(212,175,55,.16);

color:#f5d76e;

font-size:13px;
}

/* CHAT */

#chat{

flex:1;

overflow-y:auto;

padding:30px;

scroll-behavior:smooth;
}

.message{

display:flex;

margin-bottom:24px;

animation:fade .25s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:none;
}

}

.message.user{
justify-content:flex-end;
}

.message.ai{
justify-content:flex-start;
}

.bubble{

max-width:88%;

padding:22px;

border-radius:24px;

font-size:15px;
line-height:1.8;
}

.user .bubble{

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-weight:700;

border-bottom-right-radius:10px;
}

.ai .bubble{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

border-bottom-left-radius:10px;
}

/* GRANTS */

.grant-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:18px;

margin-top:18px;
}

.grant-card{

padding:22px;

border-radius:24px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

position:relative;
}

.match{

display:inline-block;

padding:8px 14px;

border-radius:999px;

background:#22c55e;

font-size:11px;
font-weight:800;

margin-bottom:14px;
}

.grant-title{

font-size:18px;
font-weight:700;

line-height:1.6;

margin-bottom:14px;

color:#f5d76e;
}

.grant-label{

font-size:11px;

text-transform:uppercase;

letter-spacing:.08em;

color:
rgba(255,255,255,.4);

margin-bottom:5px;
}

.grant-value{

font-size:14px;

line-height:1.7;

margin-bottom:14px;
}

.actions{

display:flex;
gap:12px;

margin-top:18px;

flex-wrap:wrap;
}

.apply-btn,
.proposal-btn{

display:inline-flex;
align-items:center;
justify-content:center;

padding:12px 18px;

border-radius:14px;

font-size:14px;
font-weight:700;

text-decoration:none;

cursor:pointer;
}

.apply-btn{

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;
}

.proposal-btn{

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

color:white;
}

/* PROPOSAL */

.proposal-preview{

margin-top:20px;

padding:24px;

border-radius:24px;

background:
rgba(255,255,255,.03);

border:
1px solid rgba(212,175,55,.12);
}

.proposal-header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:20px;
}

.proposal-header h2{

font-size:22px;

color:#f5d76e;
}

.pdf-btn{

padding:12px 18px;

border-radius:14px;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:14px;
font-weight:700;

text-decoration:none;
}

/* INPUT */

#input-area{

padding:22px;

border-top:
1px solid rgba(255,255,255,.05);
}

#input-wrap{

display:flex;
gap:14px;

padding:14px;

border-radius:24px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);
}

textarea{

flex:1;

background:transparent;
border:none;
outline:none;
resize:none;

font-family:'Inter',sans-serif;

font-size:15px;

color:white;
}

#send{

width:58px;
height:58px;

border:none;

border-radius:50%;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

font-size:22px;
font-weight:700;

cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

body{
padding:0;
}

#app{

height:100vh;

border-radius:0;

display:block;
}

#sidebar{
display:none;
}

#main{
height:100vh;
}

#header{
padding:18px;
}

#chat{
padding:16px;
}

.bubble{
max-width:100%;
font-size:14px;
}

.grant-grid{
grid-template-columns:1fr;
}

#input-area{
padding:14px;
}

}

</style>

</head>

<body>

<div id="app">

<!-- SIDEBAR -->

<div id="sidebar">

<div class="logo">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>
<h1>Grant Simone</h1>
<p>AI Funding Consultant</p>
</div>

</div>

<button
class="new-chat"
onclick="newChat()"
>
+ New Conversation
</button>

<div class="sidebar-title">
Recent Conversations
</div>

<div id="history"></div>

<br>

<div class="sidebar-title">
Saved Grants
</div>

<div id="saved"></div>

</div>

<!-- MAIN -->

<div id="main">

<div id="header">

<div class="header-left">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>
<h2>Grant Simone</h2>
<p>AI Grant Funding Consultant</p>
</div>

</div>

<div class="status">
● Online
</div>

</div>

<div id="chat"></div>

<div id="input-area">

<div id="input-wrap">

<textarea
id="message"
rows="1"
placeholder="Ask about grants, proposal generation, nonprofit funding..."
></textarea>

<button id="send">
↑
</button>

</div>

</div>

</div>

</div>

<script>

const API =
"https://grant-agent-backend-production.up.railway.app/grant-search";

const chat =
document.getElementById("chat");

const input =
document.getElementById("message");

const sendBtn =
document.getElementById("send");

/* STORAGE */

let conversations =
JSON.parse(
localStorage.getItem("grantSimoneConversations")
) || [];

let savedGrants =
JSON.parse(
localStorage.getItem("grantSimoneSaved")
) || [];

/* INIT */

window.onload = ()=>{

addMessage(

`Welcome to Grant Simone.

Your AI funding consultant for:

• nonprofits
• startups
• women-owned businesses
• small businesses
• NGOs

Tell me about your organization and funding goals.`,

"ai"

);

renderHistory();

renderSaved();

};

/* MESSAGE */

function addMessage(content,type,isHTML=false){

const wrapper =
document.createElement("div");

wrapper.className =
`message ${type}`;

const bubble =
document.createElement("div");

bubble.className =
"bubble";

if(isHTML){
bubble.innerHTML = content;
}else{
bubble.innerText = content;
}

wrapper.appendChild(bubble);

chat.appendChild(wrapper);

chat.scrollTop =
chat.scrollHeight;

}

/* HISTORY */

function saveConversation(message){

conversations.unshift({

title:
message.substring(0,45),

date:
new Date().toLocaleDateString(),

message

});

localStorage.setItem(
"grantSimoneConversations",
JSON.stringify(conversations)
);

renderHistory();

}

function renderHistory(){

const container =
document.getElementById("history");

if(!container) return;

container.innerHTML = "";

conversations
.slice(0,8)
.forEach((item)=>{

const div =
document.createElement("div");

div.className =
"history-item";

div.innerHTML = `

<b>${item.title}</b>

<br><br>

<small>${item.date}</small>

`;

div.onclick = ()=>{

restoreChat(item.message);

};

container.appendChild(div);

});

}

function restoreChat(message){

if(!input) return;

input.value = message;

input.focus();

}

/* SAVED */

function saveGrant(title,url){

savedGrants.unshift({
title,
url
});

localStorage.setItem(
"grantSimoneSaved",
JSON.stringify(savedGrants)
);

renderSaved();

}

function renderSaved(){

const container =
document.getElementById("saved");

container.innerHTML = "";

savedGrants.slice(0,8).forEach(grant=>{

container.innerHTML += `

<a
href="${grant.url}"
target="_blank"
class="saved-item"
>

❤️ ${grant.title}

</a>

`;

});

}

/* NEW CHAT */

function newChat(){

chat.innerHTML = "";

addMessage(
"New conversation started 👋",
"ai"
);

}

/* TYPING */

function showTyping(){

const typing =
document.createElement("div");

typing.id =
"typing";

typing.className =
"message ai";

typing.innerHTML = `

<div class="bubble">
Grant Simone is preparing your funding recommendations...
</div>

`;

chat.appendChild(typing);

chat.scrollTop =
chat.scrollHeight;

}

function removeTyping(){

const typing =
document.getElementById("typing");

if(typing){
typing.remove();
}

}

/* SEND */

async function sendMessage(){

const message =
input.value.trim();

if(!message) return;

addMessage(message,"user");

saveConversation(message);

input.value="";

showTyping();

try{

const response =
await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

businessType:"Business",
state:"California",
keywords:message

})

});

const data =
await response.json();

removeTyping();

if(
!data.grants ||
data.grants.length===0
){

addMessage(

`I couldn't find exact matches.

Please include:
• your state
• organization type
• business category
• funding goal`,

"ai"

);

return;

}

addMessage(

`I found ${data.grants.length} funding opportunities that may fit your request.`,

"ai"

);

let html =
`<div class="grant-grid">`;

data.grants.slice(0,8).forEach(grant=>{

const title =
grant.grantName ||
"Grant Opportunity";

const url =
grant.applicationUrl ||
"#";

const purpose =
grant.purpose ||
"Business Support";

const eligibility =
grant.eligibility ||
"Check requirements";

const score =
Math.floor(Math.random()*10)+90;

html += `

<div class="grant-card">

<div class="match">
${score}% MATCH
</div>

<div class="grant-title">
${title}
</div>

<div class="grant-label">
Purpose
</div>

<div class="grant-value">
${purpose}
</div>

<div class="grant-label">
Eligibility
</div>

<div class="grant-value">
${eligibility}
</div>

<div class="actions">

<a
href="${url}"
target="_blank"
class="apply-btn"
>
Apply →
</a>

<div
class="proposal-btn"
onclick="saveGrant('${title.replace(/'/g,"")}','${url}')"
>
Save
</div>

</div>

</div>

`;

});

html += `</div>`;

addMessage(html,"ai",true);

}catch(error){

removeTyping();

console.error(error);

addMessage(

`Something went wrong while connecting to the funding server.

Please try again.`,

"ai"

);

}

}

/* EVENTS */

if(sendBtn){

sendBtn.onclick = ()=>{

sendMessage();

};

}

if(input){

input.addEventListener(
"keydown",
function(e){

if(
e.key === "Enter"
&&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

}

</script>

</body>
</html>
