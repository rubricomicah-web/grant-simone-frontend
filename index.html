<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Grant Simone AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:
linear-gradient(
rgba(0,0,0,.88),
rgba(0,0,0,.95)
),
url('https://storage.googleapis.com/funnel-ai-production/image-generation/xc65ADkcJNt4QcMqV6QQ/hero-section-WtR-x4zxkO.png');

background-size:cover;
background-position:center;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:18px;

overflow:hidden;

color:white;
}

/* APP */

#app{

width:100%;
max-width:1550px;
height:95vh;

display:flex;

overflow:hidden;

border-radius:34px;

background:
rgba(10,10,10,.55);

backdrop-filter:blur(28px);

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 30px 120px rgba(0,0,0,.7);
}

/* SIDEBAR */

#sidebar{

width:330px;

padding:28px;

background:
rgba(255,255,255,.03);

border-right:
1px solid rgba(255,255,255,.05);

overflow-y:auto;
}

.logo{

display:flex;
align-items:center;
gap:14px;

margin-bottom:30px;
}

.logo img{

width:62px;
height:62px;

border-radius:50%;
}

.logo h1{

font-size:23px;
font-weight:700;
}

.logo p{

font-size:13px;

color:
rgba(255,255,255,.5);
}

.side-card{

padding:20px;

border-radius:24px;

background:
rgba(255,255,255,.03);

border:
1px solid rgba(255,255,255,.05);

margin-bottom:18px;
}

.side-card h3{

font-size:14px;
font-weight:700;

margin-bottom:14px;

color:#f5d76e;
}

.side-card p{

font-size:13px;
line-height:1.9;

color:
rgba(255,255,255,.72);
}

.quick-btn{

width:100%;

padding:14px;

margin-top:10px;

border:none;

border-radius:16px;

background:
rgba(255,255,255,.05);

color:white;

font-size:14px;
font-weight:600;

cursor:pointer;

transition:.25s;
}

.quick-btn:hover{

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;
}

/* MAIN */

#main{

flex:1;

display:flex;
flex-direction:column;

overflow:hidden;
}

/* HEADER */

#header{

padding:24px 30px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:
1px solid rgba(255,255,255,.05);
}

.header-left{

display:flex;
align-items:center;
gap:14px;
}

.header-left img{

width:52px;
height:52px;

border-radius:50%;
}

.header-left h2{

font-size:22px;
font-weight:700;
}

.header-left p{

font-size:13px;

color:
rgba(255,255,255,.5);
}

.status{

padding:10px 16px;

border-radius:999px;

background:
rgba(212,175,55,.08);

border:
1px solid rgba(212,175,55,.16);

color:#f5d76e;

font-size:13px;
}

/* CHAT */

#chat-container{

flex:1;

overflow-y:auto;

padding:30px;

scroll-behavior:smooth;
}

.message{

display:flex;

margin-bottom:24px;

animation:fade .25s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:none;
}

}

.message.user{
justify-content:flex-end;
}

.message.ai{
justify-content:flex-start;
}

.bubble{

max-width:85%;

padding:20px 24px;

border-radius:24px;

font-size:15px;
line-height:1.8;
}

.user .bubble{

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-weight:600;

border-bottom-right-radius:10px;
}

.ai .bubble{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

border-bottom-left-radius:10px;
}

/* AI THINKING */

.ai-thinking{

display:flex;
gap:8px;
align-items:center;
margin-top:14px;
}

.ai-dot{

width:8px;
height:8px;

border-radius:50%;

background:#f5d76e;

animation:bounce 1s infinite;
}

.ai-dot:nth-child(2){
animation-delay:.2s;
}

.ai-dot:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{

0%,80%,100%{
transform:scale(0);
}

40%{
transform:scale(1);
}

}

/* GRANTS */

.grant-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(340px,1fr));

gap:18px;

margin-top:20px;
}

.grant-card{

padding:22px;

border-radius:24px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

transition:.3s;
}

.grant-card:hover{

transform:translateY(-5px);

border:
1px solid rgba(212,175,55,.2);
}

.match{

display:inline-block;

padding:8px 14px;

border-radius:999px;

background:#22c55e;

font-size:11px;
font-weight:800;

margin-bottom:14px;
}

.grant-title{

font-size:17px;
font-weight:700;

line-height:1.6;

margin-bottom:16px;

color:#f5d76e;
}

.label{

font-size:11px;

text-transform:uppercase;

letter-spacing:.08em;

color:
rgba(255,255,255,.4);

margin-bottom:5px;
}

.value{

font-size:14px;

margin-bottom:16px;

line-height:1.7;
}

.apply-btn{

display:inline-flex;
align-items:center;
justify-content:center;

padding:12px 18px;

border-radius:14px;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:14px;
font-weight:700;

text-decoration:none;

margin-top:10px;
}

.ai-analysis{

margin-top:16px;

padding:14px;

border-radius:16px;

background:
rgba(212,175,55,.08);

border:
1px solid rgba(212,175,55,.14);

font-size:13px;
line-height:1.7;

color:#f8e6a0;
}

/* SUGGESTIONS */

.suggestions{

margin-top:18px;

display:flex;
flex-wrap:wrap;
gap:10px;
}

.suggestion-btn{

padding:12px 16px;

border-radius:14px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.05);

font-size:13px;

cursor:pointer;

transition:.25s;
}

.suggestion-btn:hover{

background:
rgba(212,175,55,.12);
}

/* INPUT */

#input-area{

padding:22px;

border-top:
1px solid rgba(255,255,255,.05);
}

#input-wrapper{

display:flex;
gap:14px;

padding:16px;

border-radius:24px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);
}

textarea{

flex:1;

background:transparent;
border:none;
outline:none;
resize:none;

font-family:'Inter',sans-serif;

font-size:15px;

color:white;

max-height:180px;
}

button{

width:58px;
height:58px;

border:none;

border-radius:50%;

background:
linear-gradient(
135deg,
#d4af37,
#f5d76e
);

color:black;

font-size:22px;
font-weight:700;

cursor:pointer;
}

</style>

</head>

<body>

<div id="app">

<div id="sidebar">

<div class="logo">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>
<h1>Grant Simone</h1>
<p>AI Funding Consultant</p>
</div>

</div>

<div class="side-card">

<h3>AI Capabilities</h3>

<p>

• Smart grant matching<br><br>
• AI proposal generation<br><br>
• State-specific filtering<br><br>
• Nonprofit & startup funding<br><br>
• AI funding analysis

</p>

</div>

<div class="side-card">

<h3>Quick Actions</h3>

<button
class="quick-btn"
onclick="quickPrompt('Find grants for my nonprofit in California')">
California Nonprofit Grants
</button>

<button
class="quick-btn"
onclick="quickPrompt('Find grants above $50,000')">
$50k+ Grants
</button>

<button
class="quick-btn"
onclick="quickPrompt('Generate a grant proposal')">
Generate Proposal
</button>

</div>

</div>

<div id="main">

<div id="header">

<div class="header-left">

<img
src="https://i.postimg.cc/MGLNZT5C/Grant-Simone.jpg"
/>

<div>
<h2>Grant Simone</h2>
<p>AI Grant Funding Consultant</p>
</div>

</div>

<div class="status">
● Online
</div>

</div>

<div id="chat-container"></div>

<div id="input-area">

<div id="input-wrapper">

<textarea
id="messageInput"
rows="1"
placeholder="Ask about grants, funding opportunities, or proposal generation..."
></textarea>

<button id="sendBtn">
↑
</button>

</div>

</div>

</div>

</div>

<script>

const API =
"https://grant-agent-backend-production.up.railway.app/grant-search";

const chat =
document.getElementById("chat-container");

const input =
document.getElementById("messageInput");

const sendBtn =
document.getElementById("sendBtn");

/* MEMORY */

let memory = {

state:"",
businessType:"",
organizationType:""

};

/* WELCOME */

window.onload = ()=>{

addMessage(

`Hello 👋

I'm Grant Simone.

Tell me:
• your business type
• state
• funding goals

and I'll help find the best grants for you.`,

"ai"

);

};

/* ADD MESSAGE */

function addMessage(content,type,isHTML=false){

const wrapper =
document.createElement("div");

wrapper.className =
`message ${type}`;

const bubble =
document.createElement("div");

bubble.className =
"bubble";

if(isHTML){
bubble.innerHTML = content;
}else{
bubble.innerText = content;
}

wrapper.appendChild(bubble);

chat.appendChild(wrapper);

chat.scrollTop =
chat.scrollHeight;

}

/* AI LOADING */

function addLoading(){

const wrapper =
document.createElement("div");

wrapper.className =
"message ai";

wrapper.id = "loading";

wrapper.innerHTML = `

<div class="bubble">

Grant Simone is analyzing your request...

<div class="ai-thinking">

<div class="ai-dot"></div>
<div class="ai-dot"></div>
<div class="ai-dot"></div>

</div>

</div>

`;

chat.appendChild(wrapper);

chat.scrollTop =
chat.scrollHeight;

}

function removeLoading(){

const loading =
document.getElementById("loading");

if(loading){
loading.remove();
}

}

/* QUICK */

function quickPrompt(text){

input.value = text;

sendMessage();

}

/* SEND */

async function sendMessage(){

const message =
input.value.trim();

if(!message) return;

addMessage(message,"user");

input.value = "";

addLoading();

try{

const response =
await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

businessType:
memory.businessType || "Business",

state:
memory.state || "United States",

keywords:
message

})

});

const data =
await response.json();

removeLoading();

const grants =
(data.grants || []).slice(0,6);

let html = `

<div style="margin-bottom:20px">

I found
<strong>${grants.length}</strong>
strong funding opportunities related to your request.

These grants appear to align with your funding goals and business profile.

</div>

<div class="grant-grid">

`;

grants.forEach(grant=>{

const score =
Math.floor(Math.random()*10)+90;

html += `

<div class="grant-card">

<div class="match">
${score}% MATCH
</div>

<div class="grant-title">
${grant.grantName || "Grant Opportunity"}
</div>

<div class="label">
Purpose
</div>

<div class="value">
${grant.purpose || "Business Support"}
</div>

<div class="label">
Eligibility
</div>

<div class="value">
${grant.eligibility || "Check Requirements"}
</div>

<a
class="apply-btn"
href="${grant.applicationUrl || "#"}"
target="_blank"
>

Apply for Grant →

</a>

<div class="ai-analysis">

💡 Why this matches:
<br><br>

• Strong alignment with your funding request
<br>
• Relevant business category
<br>
• Potential eligibility match

</div>

</div>

`;

});

html += `

</div>

<div class="suggestions">

<div
class="suggestion-btn"
onclick="quickPrompt('Generate a proposal for these grants')"
>
Generate Proposal
</div>

<div
class="suggestion-btn"
onclick="quickPrompt('Find local grants only')"
>
Local Grants
</div>

<div
class="suggestion-btn"
onclick="quickPrompt('Find higher funding opportunities')"
>
Higher Funding
</div>

</div>

`;

addMessage(html,"ai",true);

}catch(err){

removeLoading();

addMessage(

"Something went wrong while searching funding opportunities. Please try again.",

"ai"

);

}

}

/* EVENTS */

sendBtn.addEventListener(
"click",
sendMessage
);

input.addEventListener(
"keydown",
(e)=>{

if(
e.key==="Enter"
&&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

</script>

</body>

</html>
