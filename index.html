<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Grant Simone</title>

<style>

.saved-card{
background:#0d0d0d;
border:1px solid rgba(255,213,79,0.18);
border-radius:20px;
padding:18px;
margin-bottom:16px;
cursor:pointer;
transition:0.25s;
}

.saved-card:hover{
transform:translateY(-4px);
border-color:#FFD54F;
}

.saved-card h3{
font-size:20px;
margin-bottom:8px;
color:white;
}

.saved-card p{
color:#999;
font-size:14px;
}

/* CLICKABLE */

.saved-card button{
margin-top:12px;
padding:10px 16px;
border:none;
border-radius:12px;
background:#FFD54F;
color:black;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<script>

/* =========================
SAVE GRANT
========================= */

function saveGrant(
title,
amount,
desc,
link
){

const container =
document.getElementById("savedContainer");

/* PREVENT DUPLICATE */

const existing =
document.getElementById(
"saved-" + title
);

if(existing){
return;
}

container.innerHTML += `

<div
class="saved-card"
id="saved-${title}"
>

<h3>
⭐ ${title}
</h3>

<p>
Saved Grant
</p>

<button
onclick="
openGrantModal(
'${title}',
'${amount}',
'${desc}',
'${link}'
)
"
>
Open Grant
</button>

</div>
`;

}

/* =========================
OPEN MODAL
========================= */

function openGrantModal(
title,
amount,
desc,
link
){

const oldModal =
document.getElementById(
"grantModal"
);

if(oldModal){
oldModal.remove();
}

const modal =
document.createElement("div");

modal.id = "grantModal";

modal.innerHTML = `

<div class="custom-modal-overlay">

<div class="custom-modal">

<button
class="close-modal"
onclick="closeGrantModal()"
>
✕
</button>

<div class="badge">
${amount}
</div>

<h1 class="modal-title">
${title}
</h1>

<p class="modal-desc">
${desc}
</p>

<div class="modal-actions">

<a
href="${link}"
target="_blank"
class="btn primary"
style="text-decoration:none;"
>
Official Website
</a>

<button
class="btn secondary"
onclick="downloadPDF()"
>
Download PDF
</button>

</div>

</div>

</div>
`;

document.body.appendChild(modal);

}

/* =========================
CLOSE MODAL
========================= */

function closeGrantModal(){

const modal =
document.getElementById(
"grantModal"
);

if(modal){
modal.remove();
}

}

</script>

</body>
</html>
